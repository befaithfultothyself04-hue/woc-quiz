  {id:174, school:"予想問題", topic:"失禁関連皮膚炎（IAD）・排泄ケア", question:"78歳女性。認知症があり自分でトイレの訴えができない。おむつ使用中で1日10回前後の尿失禁あり。IAD予防を目的とした排泄ケアとして最も適切な対応はどれか。", options:["24時間おむつを使用し定期的な交換のみで対応する","排泄パターンを把握してトイレ誘導を試み、失禁があれば皮膚を洗浄・保護するスキンケアを組み合わせる","認知症のため排泄自立は不可能と判断し排泄ケアの評価は行わない","尿量を減らすため水分摂取を1日500mL以下に制限する","夜間のみおむつを使用し日中はリハビリパンツに変更するだけでよい"], answer:1, explanation:"正解：②認知症であっても排泄パターン（時間・量）を把握した上でトイレ誘導（定時排泄誘導）を試みることがIAD予防の基本戦略であり、これにより失禁量・頻度の軽減が期待できる。失禁が生じた場合は速やかに洗浄し皮膚保護クリームを塗布する構造化スキンケアを行う。①誤：おむつのみの対応では皮膚への刺激接触時間が長くなりIADリスクが上昇する。③誤：認知症があってもケアの評価・改善は可能であり放棄は不適切。④誤：水分制限は尿が濃縮されかえって皮膚刺激が増し脱水・尿路感染リスクも高まる。⑤誤：排泄パターンに基づかない対応であり、包括的な排泄ケア計画が必要。"},
  {id:175, school:"予想問題", topic:"失禁関連皮膚炎（IAD）・排泄ケア", question:"IADの予防・管理における「構造化スキンケア」の正しいステップの順序はどれか。", options:["保護→洗浄→保湿","洗浄→保護→保湿","洗浄→保湿→保護","保湿→洗浄→保護","保護→保湿→洗浄"], answer:2, explanation:"正解：③IADに対する構造化スキンケアは「①洗浄（Cleansing）→②保湿（Moisturizing）→③保護（Protecting）」の順に行う。まず低刺激性の洗浄剤（弱酸性・ノンアルコール等）で優しく洗浄して汚染物質を除去し、次に保湿剤で皮膚の水分保持機能を補い、最後に撥水性の皮膚保護剤（ジンクオキサイド含有軟膏・フィルム型保護剤等）を塗布して尿・便の刺激から保護する。①②④⑤誤：順序が異なると洗浄剤で保護剤が流れる・保護が不十分になる等の問題が生じ、スキンケア効果が半減する。特に「保護→洗浄」の順では、洗浄時に保護剤が除去され皮膚保護の意味がなくなる。"},
{id:176, school:"予想問題", topic:"創傷治癒・湿潤療法", question:"創傷治癒の過程を正しい順序に並べたものはどれか。", options:["炎症期→増殖期→止血期→成熟期","止血期→炎症期→増殖期→成熟期","増殖期→止血期→炎症期→成熟期","止血期→増殖期→炎症期→成熟期","炎症期→止血期→増殖期→成熟期"], answer:1, explanation:"正解：止血期→炎症期→増殖期→成熟期。創傷治癒は①止血期（血小板凝集・フィブリン血栓形成）、②炎症期（好中球・マクロファージの浸潤）、③増殖期（肉芽形成・血管新生・線維芽細胞増殖）、④成熟期（コラーゲン再構築・瘢痕形成）の順で進む。①誤：炎症期が止血期より先になっている。③誤：増殖期が最初に来ており順序が逆。④誤：増殖期と炎症期が逆。⑤誤：止血期が炎症期の後になっている。"},
{id:177, school:"予想問題", topic:"創傷治癒・湿潤療法", question:"湿潤療法（モイストヒーリング）の理論的根拠として最も正しい記述はどれか。", options:["乾燥した創面は細菌繁殖を抑制するため治癒が促進される","創面を湿潤に保つことで上皮細胞の遊走が促進される","湿潤環境は滲出液を増加させるため感染リスクが上がる","創面の乾燥はサイトカインの活性化を促す","ドレッシング材は毎日交換することで治癒が促進される"], answer:1, explanation:"正解：創面を湿潤に保つことで上皮細胞の遊走が促進される。Winter（1962年）の研究により、湿潤環境では上皮細胞が創面を自由に遊走でき、乾燥環境より治癒速度が約2倍速いことが証明された。①誤：乾燥は痂皮を形成し上皮化を妨げる。③誤：適切な湿潤環境は感染リスクを高めない（過湿潤は別問題）。④誤：乾燥ではなく湿潤環境がサイトカイン活性を維持する。⑤誤：頻繁な交換は肉芽を損傷し治癒を遅延させる。"},
{id:178, school:"予想問題", topic:"創傷治癒・湿潤療法", question:"創傷床の評価に用いるCOLORスキームで「黄色（Yellow）」が示す組織はどれか。", options:["良好な肉芽組織","壊死した組織（乾燥痂皮）","フィブリンや壊死組織（湿性壊死）","感染を示す紅斑","上皮化が進んだ組織"], answer:2, explanation:"正解：フィブリンや壊死組織（湿性壊死）。COLORスキームでは、Red（赤）＝良好な肉芽・治癒傾向、Yellow（黄）＝フィブリンや湿性壊死組織でデブリードマンが必要、Black（黒）＝乾燥壊死組織、Pink（ピンク）＝上皮化している組織を示す。①誤：赤色（Red）が良好な肉芽組織を示す。②誤：乾燥壊死（痂皮）は黒色（Black）。④誤：感染の紅斑はこのスキームとは別に評価する。⑤誤：上皮化組織はPink（ピンク）で表す。"},
{id:179, school:"予想問題", topic:"創傷治癒・湿潤療法", question:"68歳女性。糖尿病があり、右下腿に2週間前から治癒しない創傷がある。創底は黄白色の壊死組織で覆われ、周囲皮膚に浮腫あり。滲出液は多量で浸軟が見られる。この創傷のWound Bed Preparation（WBP）として最初に行うべき対応はどれか。", options:["ハイドロコロイドドレッシングを貼付して密閉する","壊死組織のデブリードマンを実施する","ポビドンヨード液で創面を消毒する","アルギン酸塩ドレッシングで滲出液を管理する","抗菌薬の全身投与を開始する"], answer:1, explanation:"正解：壊死組織のデブリードマンを実施する。WBPのTIMEフレームワークでは、T（Tissue）＝壊死組織の除去が最初のステップ。壊死組織は細菌の培地となり治癒を妨げるため、まずデブリードマンが必要。①誤：壊死組織が残ったまま密閉すると嫌気性菌増殖のリスクがある。③誤：ポビドンヨードは正常組織にも毒性があり湿潤療法の妨げになる。④誤：滲出液管理は壊死除去後に検討する。⑤誤：局所感染の根本は壊死組織除去であり、全身投与の前に局所対応が優先される。"},
{id:180, school:"予想問題", topic:"創傷治癒・湿潤療法", question:"創傷治癒を促進する成長因子（増殖因子）と主な役割の組み合わせで正しいのはどれか。", options:["EGF（上皮成長因子）―コラーゲン産生促進","PDGF（血小板由来成長因子）―上皮細胞の増殖促進","VEGF（血管内皮成長因子）―血管新生促進","TGF-β（形質転換成長因子β）―抗炎症作用のみ","bFGF（塩基性線維芽細胞成長因子）―血小板凝集促進"], answer:2, explanation:"正解：VEGF（血管内皮成長因子）―血管新生促進。VEGFは血管内皮細胞の増殖・遊走を促し、創傷部への血流供給を回復させる重要な役割を担う。①誤：EGFは上皮細胞・線維芽細胞の増殖を促すが、コラーゲン産生はTGF-βの役割。②誤：PDGFは線維芽細胞・平滑筋細胞の遊走・増殖を促し、肉芽形成に関与する。④誤：TGF-βはコラーゲン産生促進・線維化に関わり、過剰では肥厚性瘢痕の原因となる。⑤誤：bFGFは線維芽細胞・血管内皮細胞の増殖を促すが血小板凝集はトロンボキサンA2等の役割。"},
{id:181, school:"予想問題", topic:"創傷治癒・湿潤療法", question:"陰圧閉鎖療法（NPWT/VAC療法）の適応と禁忌について最も適切な記述はどれか。", options:["悪性腫瘍を含む創傷に積極的に使用できる","創内に露出した血管・臓器・神経がある場合は禁忌である","未治療の骨髄炎がある場合に第一選択となる","活動性出血がある創傷への使用を推奨する","圧力は-100mmHgに固定して使用する"], answer:1, explanation:"正解：創内に露出した血管・臓器・神経がある場合は禁忌である。NPWTは陰圧により肉芽形成・浮腫軽減・滲出液除去を促すが、血管・臓器・神経の露出部位では損傷リスクがあり禁忌。①誤：悪性腫瘍を含む創傷は禁忌（腫瘍細胞拡散のリスク）。③誤：未治療の骨髄炎は禁忌であり第一選択ではない。④誤：活動性出血は禁忌（出血促進のリスク）。⑤誤：圧力は創の状態・部位により-75〜-125mmHgで調整し固定値ではない。"},
{id:182, school:"予想問題", topic:"創傷治癒・湿潤療法", question:"75歳男性。仙骨部にDTI（深部組織損傷）が疑われる褥瘡がある。皮膚表面は紫色・暗赤色の変色のみで開放創はない。この時点での対応として最も適切なのはどれか。", options:["速やかに切開デブリードマンを実施する","変色部位を強くマッサージして血流を改善する","ポリウレタンフォームで保護し除圧・観察を続ける","変色部をヨードホルムガーゼで覆い感染予防する","乾燥させるため何も貼付せずに経過観察する"], answer:2, explanation:"正解：ポリウレタンフォームで保護し除圧・観察を続ける。DTIは皮下深部の組織が既に損傷しており、数日後に開放創になる可能性が高い。この段階では除圧の徹底・皮膚保護・頻回な観察が重要であり、フォームドレッシングで保護する。①誤：DTI疑いの段階での外科的デブリードマンは損傷を拡大させる危険性がある。②誤：変色部へのマッサージは禁忌（組織破壊を促進）。④誤：ヨードホルムガーゼは湿潤療法に反し、細胞毒性もある。⑤誤：皮膚の乾燥は組織の脆弱化を招き保護のために何らかの被覆が必要。"},
{id:183, school:"予想問題", topic:"創傷治癒・湿潤療法", question:"創傷治癒を遅延させる全身的因子として誤っているのはどれか。", options:["糖尿病による高血糖状態","低アルブミン血症（栄養不良）","ステロイド薬の長期使用","適度な有酸素運動","末梢循環障害（虚血）"], answer:3, explanation:"正解（誤り）：適度な有酸素運動。有酸素運動は血流を改善し酸素・栄養の供給を促進するため、創傷治癒を促進する因子である。①誤りではない：高血糖は白血球機能低下・血管障害・神経障害により治癒を著しく遅延させる。②誤りではない：低アルブミンはコラーゲン合成に必要なタンパク質不足を招き治癒遅延の主因となる。③誤りではない：ステロイドは炎症抑制・線維芽細胞抑制・コラーゲン合成阻害により治癒を妨げる。⑤誤りではない：組織への酸素・栄養供給が不足し治癒不全となる。"},
{id:184, school:"予想問題", topic:"創傷治癒・湿潤療法", question:"82歳女性。開腹手術後7日目。創部に発赤・熱感・腫脹があり、縫合部から淡黄色の滲出液が滲んでいる。縫合不全が疑われる。WOC認定看護師として行うアセスメントと初期対応で最も適切なのはどれか。", options:["滲出液をそのままにして抗菌薬軟膏を塗布する","創部の離開の程度・深さ・滲出液の性状を詳細に観察し、外科医に報告する","ハイドロコロイドドレッシングで密閉し感染を防ぐ","生理食塩水での洗浄後すぐに二次縫合を行う","硫酸バリウム含有ガーゼで創部を充填する"], answer:1, explanation:"正解：創部の離開の程度・深さ・滲出液の性状を詳細に観察し、外科医に報告する。縫合不全（SSI含む）では創の状態を詳細にアセスメントし、外科医と連携した対応が最優先。WOC認定看護師は創傷のアセスメントと管理を行い、必要に応じて外科的処置（デブリードマン・ドレナージ）へ橋渡しをする。①誤：感染が疑われる創への軟膏塗布のみでは不十分であり、まず正確な評価が必要。③誤：感染創をハイドロコロイドで密閉すると嫌気性菌増殖のリスクがある。④誤：二次縫合はWOC認定看護師が単独で行う処置ではなく、外科医の判断が必要。⑤誤：硫酸バリウムは造影剤であり創の充填材ではない。"},
{id:185, school:"予想問題", topic:"創傷治癒・湿潤療法", question:"WBP（Wound Bed Preparation）のTIMEフレームワークに関して正しい組み合わせはどれか。", options:["T―Tissue（組織）：壊死組織・スラフの除去","I―Infection（感染）：創部の洗浄のみ","M―Moisture（湿潤）：過乾燥のみの管理","E―Edge（創縁）：創周囲皮膚のマッサージ","T―Temperature（温度）：創面の冷却管理"], answer:0, explanation:"正解：T―Tissue（組織）：壊死組織・スラフの除去。TIMEフレームワークはT（Tissue management：壊死組織管理）、I（Infection/Inflammation control：感染・炎症制御）、M（Moisture balance：湿潤バランス）、E（Edge of wound advancement：創縁・上皮化促進）の4要素からなる創傷管理の枠組み。①正：壊死組織の除去が最初のステップ。②誤：IはInfection/Inflammationで感染・炎症の制御であり、洗浄だけでなく抗菌材の使用や全身管理も含む。③誤：MはMoisture balanceで過湿潤・過乾燥の両方を管理する。④誤：EはEdge of wound advancementで創縁の上皮化促進・ポケット形成の管理であり、マッサージではない。⑤誤：TはTissueであり温度管理はTIMEの要素ではない。"},
];

// ===== ローカルストレージ安全読み込み =====
function safeGetLS(key, fallback) {
  try {
    var val = localStorage.getItem(key);
    return val ? JSON.parse(val) : fallback;
  } catch(e) {
    try { localStorage.removeItem(key); } catch(e2) {}
    return fallback;
  }
}

// ===== アプリ状態 =====
// ===== 途中再開 =====
function saveResume(indexOverride) {
  try {
    if (state.quizQueue.length === 0) return;
    var saveIndex = (indexOverride !== undefined) ? indexOverride : state.currentIndex;
    if (saveIndex >= state.quizQueue.length) return; // 全問終了後は保存しない
    var data = {
      queueIds: state.quizQueue.map(function(q) { return q.id; }),
      currentIndex: saveIndex,
      results: state.sessionResults.map(function(r) { return { id: r.q.id, correct: r.correct }; }),
      school: state.selectedSchool,
      topic: state.selectedTopic,
      mode: state.currentMode,
      savedAt: Date.now()
    };
    localStorage.setItem('woc_resume', JSON.stringify(data));
  } catch(e) {}
}

function clearResume() {
  try { localStorage.removeItem('woc_resume'); } catch(e) {}
  var card = document.getElementById('resume-card');
  if (card) card.style.display = 'none';
}

function resumeQuiz() {
  try {
    var data = safeGetLS('woc_resume', null);
    if (!data || !data.queueIds || !Array.isArray(data.queueIds)) { clearResume(); return; }
    // ID は数値・文字列どちらでも一致するよう Number() で変換
    var queue = data.queueIds.map(function(id) {
      var numId = Number(id);
      return questions.find(function(q) { return q.id === numId; });
    }).filter(Boolean);
    if (queue.length === 0) { clearResume(); return; }
    var resumeIndex = Math.min(Number(data.currentIndex) || 0, queue.length - 1);
    state.quizQueue = queue;
    state.currentIndex = resumeIndex;
    state.selectedSchool = data.school || 'all';
    state.selectedTopic = data.topic || 'all';
    state.currentMode = data.mode || 'order';
    state.sessionResults = (data.results || []).filter(Boolean).map(function(r) {
      if (!r || r.id == null) return null;
      var q = questions.find(function(q) { return q.id === Number(r.id); });
      return q ? { q: q, correct: !!r.correct } : null;
    }).filter(Boolean);
    switchScreen('screen-quiz', 1);
    loadQuestion();
  } catch(e) {
    clearResume();
    alert('再開に失敗しました。最初から始めます。\nエラー: ' + (e && e.message ? e.message : String(e)));
  }
}

function checkResume() {
  try {
    var data = safeGetLS('woc_resume', null);
    if (!data || !data.queueIds) return;
    var remaining = data.queueIds.length - data.currentIndex;
    if (remaining <= 0) { clearResume(); return; }
    var date = new Date(data.savedAt);
    var h = date.getHours(), m = String(date.getMinutes()).padStart(2, '0');
    var info = data.currentIndex + '問完了 / 残り' + remaining + '問（' + h + ':' + m + '中断）';
    var card = document.getElementById('resume-card');
    var infoEl = document.getElementById('resume-info');
    if (card && infoEl) {
      infoEl.textContent = info;
      card.style.display = 'block';
    }
  } catch(e) {}
}

let state = {
  currentMode: 'order',
  selectedSchool: 'all',
  selectedTopic: 'all',
  quizQueue: [],
  currentIndex: 0,
  currentQuestion: null,
  answered: false,
  sessionResults: [],
  history: safeGetLS('woc_history', {}),
  bookmarks: safeGetLS('woc_bookmarks', []),
};

// ===== 初期化 =====
function init() {
  // 最初にホーム画面を確実に表示
  document.querySelectorAll('.screen').forEach(function(s) { s.style.display = 'none'; });
  var homeScreen = document.getElementById('screen-home');
  if (homeScreen) homeScreen.style.display = 'block';

  var schools = [];
  var seenSchools = {};
  questions.forEach(function(q) { if (!seenSchools[q.school]) { schools.push(q.school); seenSchools[q.school] = true; } });

  var topics = [];
  var seenTopics = {};
  questions.forEach(function(q) { if (!seenTopics[q.topic]) { topics.push(q.topic); seenTopics[q.topic] = true; } });

  var sf = document.getElementById('school-filters');
  if (sf) {
    schools.forEach(function(s) {
      var sp = document.createElement('span');
      sp.className = 'chip';
      sp.setAttribute('data-filter', s);
      sp.onclick = function() { setFilter(this, 'school'); };
      sp.textContent = s;
      sf.appendChild(sp);
    });
  }

  var tf = document.getElementById('topic-filters');
  if (tf) {
    topics.forEach(function(t) {
      var sp = document.createElement('span');
      sp.className = 'chip';
      sp.setAttribute('data-topic', t);
      sp.onclick = function() { setFilter(this, 'topic'); };
      sp.textContent = t;
      tf.appendChild(sp);
    });
  }

  updateHomeStats();
  try { updateBookmarkList(); } catch(e) {}
  try { updateStatsScreen(); } catch(e) {}
}

function updateHomeStats() {
  const total = questions.length;
  const done = Object.keys(state.history).length;
  const correct = Object.values(state.history).filter(v => v.correct).length;
  const acc = done > 0 ? Math.round(correct / done * 100) : 0;

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-accuracy').textContent = done > 0 ? acc + '%' : '-%';

  checkResume();
}

// ===== タブ切替 =====
function showTab(tab, btn) {
  if (tab !== 'quiz' && state.quizQueue.length > 0 && state.currentIndex > 0) saveResume(state.currentIndex);
  document.querySelectorAll('.screen').forEach(function(s) { s.style.display = 'none'; });
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  var screen = document.getElementById('screen-' + tab);
  if (screen) screen.style.display = 'block';
  if (btn) btn.classList.add('active');
  if (tab === 'bookmark') updateBookmarkList();
  if (tab === 'stats') updateStatsScreen();
  if (tab === 'home') updateHomeStats();
}

// ===== フィルター =====
function setFilter(el, type) {
  if (type === 'school') {
    document.querySelectorAll('#school-filters .chip').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    state.selectedSchool = el.dataset.filter;
  } else {
    document.querySelectorAll('#topic-filters .chip').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    state.selectedTopic = el.dataset.topic;
  }
}
function setMode(el, type) {
  document.querySelectorAll(`[data-mode]`).forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  state.currentMode = el.dataset.mode;
}

// ===== 安全な画面切り替え =====
function switchScreen(targetId, tabIndex) {
  document.querySelectorAll('.screen').forEach(function(s) { s.style.display = 'none'; });
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  var target = document.getElementById(targetId);
  if (target) { target.style.display = 'block'; }
  var tabs = document.querySelectorAll('.tab-btn');
  if (tabs[tabIndex]) { tabs[tabIndex].classList.add('active'); }
}

// ===== クイズ開始 =====
function startQuiz() {
  try {
    var pool = questions.filter(function(q) {
      if (state.selectedSchool !== 'all' && q.school !== state.selectedSchool) return false;
      if (state.selectedTopic !== 'all' && q.topic !== state.selectedTopic) return false;
      return true;
    });

    if (state.currentMode === 'wrong') pool = pool.filter(function(q) { return state.history[q.id] && !state.history[q.id].correct; });
    if (state.currentMode === 'bookmark') pool = pool.filter(function(q) { return Array.isArray(state.bookmarks) && state.bookmarks.indexOf(q.id) !== -1; });
    if (state.currentMode === 'random') pool = pool.sort(function() { return Math.random() - 0.5; });
    if (pool.length === 0) { alert('該当する問題がありません。\n出題モードや絞り込みを確認してください。'); return; }

    state.quizQueue = pool;
    state.currentIndex = 0;
    state.sessionResults = [];
    clearResume();
    switchScreen('screen-quiz', 1);
    loadQuestion();
  } catch(e) {
    console.error('startQuiz error:', e);
    switchScreen('screen-home', 0);
    alert('問題の読み込みに失敗しました。ページを再読み込みしてください。\n(' + e.message + ')');
  }
}

function loadQuestion() {
  try {
    if (state.currentIndex >= state.quizQueue.length) { showResult(); return; }

    var q = state.quizQueue[state.currentIndex];
    if (!q) { showResult(); return; }
    state.currentQuestion = q;
    state.answered = false;

    var total = state.quizQueue.length;
    var cur = state.currentIndex + 1;

    var pb = document.getElementById('progress-bar');
    if (pb) pb.style.width = ((cur-1)/total*100) + '%';

    var counter = document.getElementById('quiz-counter');
    if (counter) counter.textContent = cur + ' / ' + total;

    var schoolEl = document.getElementById('quiz-school');
    if (schoolEl) schoolEl.textContent = q.school || '';

    var topicEl = document.getElementById('quiz-topic');
    if (topicEl) topicEl.textContent = q.topic || '';

    // 事例テキスト
    var caseBox = document.getElementById('case-box');
    if (caseBox) {
      if (q.type === 'case') {
        caseBox.style.display = 'block';
        var cn = document.getElementById('case-name');
        var ct = document.getElementById('case-text');
        if (cn) cn.textContent = q.caseName || '';
        if (ct) ct.textContent = q.caseText || '';
      } else {
        caseBox.style.display = 'none';
      }
    }

    var qtEl = document.getElementById('question-text');
    if (qtEl) qtEl.textContent = q.question || '';

    var optList = document.getElementById('options-list');
    if (optList) {
      optList.innerHTML = '';
      (q.options || []).forEach(function(opt, i) {
        var btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt;
        btn.onclick = (function(idx) { return function() { selectAnswer(idx); }; })(i);
        optList.appendChild(btn);
      });
    }

    var expBox = document.getElementById('explanation-box');
    if (expBox) expBox.classList.remove('show');

    var nextBtn = document.getElementById('next-btn');
    if (nextBtn) nextBtn.classList.remove('show');

    var bm = document.getElementById('bookmark-btn');
    if (bm) {
      var isBookmarked = Array.isArray(state.bookmarks) && state.bookmarks.indexOf(q.id) !== -1;
      bm.textContent = isBookmarked ? '★' : '☆';
      bm.className = 'bookmark-btn' + (isBookmarked ? ' active' : '');
    }
  } catch(e) {
    console.error('loadQuestion error:', e);
    switchScreen('screen-home', 0);
    alert('問題の表示中にエラーが発生しました。ホームに戻ります。\n(' + e.message + ')');
  }
}

function selectAnswer(idx) {
  if (state.answered) return;
  state.answered = true;

  const q = state.currentQuestion;
  const correct = idx === q.answer;
  const btns = document.querySelectorAll('.option-btn');

  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.answer) btn.classList.add('correct');
    else if (i === idx && !correct) btn.classList.add('wrong');
  });

  document.getElementById('explanation-text').textContent = q.explanation || '';
  document.getElementById('explanation-box').classList.add('show');
  document.getElementById('next-btn').classList.add('show');
  document.getElementById('next-btn').textContent = state.currentIndex < state.quizQueue.length - 1 ? '次の問題 →' : '結果を見る 📊';

  // 記録
  state.history[q.id] = { correct, timestamp: Date.now(), topic: q.topic };
  try { localStorage.setItem('woc_history', JSON.stringify(state.history)); } catch(e) {}
  state.sessionResults.push({ q, correct });
  saveResume(state.currentIndex + 1); // 解答直後に保存（閉じても再開できる）
}

function nextQuestion() {
  state.currentIndex++;
  saveResume();
  loadQuestion();
}

function toggleBookmark() {
  const id = state.currentQuestion.id;
  if (state.bookmarks.includes(id)) {
    state.bookmarks = state.bookmarks.filter(x => x !== id);
    document.getElementById('bookmark-btn').textContent = '☆';
    document.getElementById('bookmark-btn').className = 'bookmark-btn';
  } else {
    state.bookmarks.push(id);
    document.getElementById('bookmark-btn').textContent = '★';
    document.getElementById('bookmark-btn').className = 'bookmark-btn active';
  }
  try { localStorage.setItem('woc_bookmarks', JSON.stringify(state.bookmarks)); } catch(e) {}
}

// ===== 結果表示 =====
function showResult() {
  clearResume();
  document.querySelectorAll('.screen').forEach(function(s) { s.style.display = 'none'; });
  var resultScreen = document.getElementById('screen-result');
  if (resultScreen) resultScreen.style.display = 'block';

  const total = state.sessionResults.length;
  const correct = state.sessionResults.filter(r => r.correct).length;
  const pct = Math.round(correct / total * 100);

  document.getElementById('score-pct').textContent = pct + '%';
  document.getElementById('score-sub').textContent = `${correct}/${total}問`;
  document.getElementById('res-correct').textContent = correct;
  document.getElementById('res-wrong').textContent = total - correct;
  document.getElementById('res-bookmark').textContent = state.sessionResults.filter(r => state.bookmarks.includes(r.q.id)).length;

  const circle = document.getElementById('score-circle');
  circle.className = 'score-circle ' + (pct >= 80 ? 'great' : pct >= 60 ? 'good' : 'ok');

  const msgs = pct >= 90 ? ['完璧です！🏆', '全領域でしっかり理解できています。この調子で！'] :
               pct >= 80 ? ['素晴らしい！🎉', '合格水準です。苦手分野を重点的に復習しましょう。'] :
               pct >= 60 ? ['もう一息！💪', '間違えた問題を中心に復習しましょう。'] :
                           ['頑張りましょう！📖', '基礎から丁寧に復習することが大切です。'];
  document.getElementById('score-message').textContent = msgs[0];
  document.getElementById('score-comment').textContent = msgs[1];

  // テーマ別
  const topicMap = {};
  state.sessionResults.forEach(r => {
    if (!topicMap[r.q.topic]) topicMap[r.q.topic] = { correct: 0, total: 0 };
    topicMap[r.q.topic].total++;
    if (r.correct) topicMap[r.q.topic].correct++;
  });

  const list = document.getElementById('topic-results-list');
  list.innerHTML = '';
  Object.entries(topicMap).sort((a,b) => (a[1].correct/a[1].total) - (b[1].correct/b[1].total)).forEach(([topic, data]) => {
    const pct = Math.round(data.correct/data.total*100);
    const color = pct >= 80 ? '#38a169' : pct >= 60 ? '#d69e2e' : '#e53e3e';
    list.innerHTML += `<div class="topic-row"><span style="min-width:120px;font-size:12px">${topic}</span><div class="topic-bar-wrap"><div class="topic-bar" style="width:${pct}%;background:${color}"></div></div><span style="font-size:12px;font-weight:700;color:${color}">${pct}%</span></div>`;
  });

  updateHomeStats();
}

function retryWrong() {
  var wrongIds = state.sessionResults.filter(function(r) { return !r.correct; }).map(function(r) { return r.q.id; });
  if (wrongIds.length === 0) { alert('間違えた問題はありません！'); return; }
  state.quizQueue = questions.filter(function(q) { return wrongIds.indexOf(q.id) !== -1; });
  state.currentIndex = 0;
  state.sessionResults = [];
  switchScreen('screen-quiz', 1);
  loadQuestion();
}

function goHome() {
  if (state.quizQueue.length > 0 && state.currentIndex > 0) saveResume(state.currentIndex);
  switchScreen('screen-home', 0);
  document.querySelectorAll('.tab-btn').forEach(function(b, i) { b.classList.toggle('active', i===0); });
  updateHomeStats();
}

// ===== ブックマーク =====
function updateBookmarkList() {
  const list = document.getElementById('bookmark-list');
  const bms = questions.filter(q => state.bookmarks.includes(q.id));
  if (bms.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">⭐</div><p>クイズ中に☆ボタンを押すと<br>ここに追加されます</p></div>';
    return;
  }
  list.innerHTML = bms.map(q => `
    <div class="bookmark-item" onclick="startSingleQuestion(${q.id})">
      <div class="bookmark-item-meta">${q.school} ｜ ${q.topic}</div>
      <div class="bookmark-item-q">${q.question.substring(0,60)}${q.question.length>60?'…':''}</div>
      <div class="bookmark-item-hint">▶ タップして解く</div>
    </div>`).join('');
}

function startSingleQuestion(id) {
  try {
    var q = questions.find(function(q) { return q.id === id; });
    if (!q) return;
    state.quizQueue = [q];
    state.currentIndex = 0;
    state.sessionResults = [];
    clearResume();
    switchScreen('screen-quiz', 1);
    loadQuestion();
  } catch(e) {
    alert('問題を開けませんでした。');
  }
}

// ===== 統計 =====
function updateStatsScreen() {
  const schools = [...new Set(questions.map(q => q.school))];
  const sl = document.getElementById('school-stats-list');
  sl.innerHTML = schools.map(s => {
    const cnt = questions.filter(q => q.school === s).length;
    return `<div class="topic-row"><span style="font-size:13px;font-weight:600">${s}</span><span style="font-size:13px;color:#2b6cb0;font-weight:700">${cnt}問</span></div>`;
  }).join('');

  const topics = [...new Set(questions.map(q => q.topic))];
  const tl = document.getElementById('topic-stats-list');
  tl.innerHTML = topics.map(t => {
    const qs = questions.filter(q => q.topic === t);
    const done = qs.filter(q => state.history[q.id]);
    const correct = done.filter(q => state.history[q.id]?.correct).length;
    const pct = done.length > 0 ? Math.round(correct/done.length*100) : null;
    const color = pct === null ? '#a0aec0' : pct >= 80 ? '#38a169' : pct >= 60 ? '#d69e2e' : '#e53e3e';
    return `<div class="topic-row"><span style="min-width:130px;font-size:12px">${t}（${qs.length}問）</span><div class="topic-bar-wrap"><div class="topic-bar" style="width:${pct||0}%;background:${color}"></div></div><span style="font-size:12px;font-weight:700;color:${color}">${pct !== null ? pct+'%' : '-'}</span></div>`;
  }).join('');

  const weak = topics
    .map(t => {
      const qs = questions.filter(q => q.topic === t);
      const done = qs.filter(q => state.history[q.id]);
      const correct = done.filter(q => state.history[q.id]?.correct).length;
      return { topic: t, pct: done.length > 0 ? correct/done.length : null };
    })
    .filter(x => x.pct !== null)
    .sort((a,b) => a.pct - b.pct)
    .slice(0, 3);

  const wl = document.getElementById('weak-topics-list');
  if (weak.length === 0) {
    wl.innerHTML = '<p style="color:#a0aec0;font-size:13px;text-align:center;padding:20px">クイズを解くと苦手テーマが表示されます</p>';
  } else {
    wl.innerHTML = weak.map((w, i) => `
      <div class="topic-row">
        <span style="font-size:20px">${['🥇','🥈','🥉'][i]}</span>
        <span style="flex:1;padding:0 10px;font-size:13px;font-weight:600">${w.topic}</span>
        <span style="font-size:13px;font-weight:700;color:#e53e3e">${Math.round(w.pct*100)}%</span>
      </div>`).join('');
  }
}

// ===== 起動 =====
try { init(); } catch(e) { console.error('init error:', e); }
</script>
</body>
</html>
