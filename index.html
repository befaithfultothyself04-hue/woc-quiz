<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WOC認定看護師 入試対策クイズ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #f0f4f8; color: #1a202c; min-height: 100vh; -webkit-text-size-adjust: 100%; }
  /* スマホタップ最適化 */
  button, .chip { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  input, select { font-size: 16px; } /* iOSズーム防止 */

  /* ヘッダー */
  .header { background: linear-gradient(135deg, #2b6cb0, #2c5282); color: white; padding: 16px 20px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
  .header h1 { font-size: 16px; font-weight: 700; }
  .header p { font-size: 12px; opacity: 0.85; margin-top: 2px; }

  /* タブナビ */
  .tab-nav { display: flex; background: white; border-bottom: 2px solid #e2e8f0; position: sticky; top: 64px; z-index: 99; }
  .tab-btn { flex: 1; padding: 13px 4px; font-size: 13px; font-weight: 600; color: #718096; border: none; background: none; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; min-height: 50px; }
  .tab-btn.active { color: #2b6cb0; border-bottom-color: #2b6cb0; }

  /* メインコンテンツ */
  .screen { display: none; padding: 16px; max-width: 640px; margin: 0 auto; }

  /* ホーム画面 */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .stat-card { background: white; border-radius: 12px; padding: 16px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .stat-number { font-size: 32px; font-weight: 800; color: #2b6cb0; }
  .stat-label { font-size: 12px; color: #718096; margin-top: 4px; }

  .filter-section { background: white; border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .filter-section h3 { font-size: 14px; font-weight: 700; color: #4a5568; margin-bottom: 12px; }
  .filter-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { padding: 8px 16px; border-radius: 20px; border: 2px solid #e2e8f0; font-size: 14px; cursor: pointer; transition: all 0.2s; background: white; color: #4a5568; min-height: 40px; display: inline-flex; align-items: center; }
  .chip.selected { background: #2b6cb0; border-color: #2b6cb0; color: white; }

  .start-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #38a169, #2f855a); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 12px rgba(56,161,105,0.4); transition: transform 0.1s; }
  .start-btn:active { transform: scale(0.98); }

  /* クイズ画面 */
  .progress-bar-wrap { background: #e2e8f0; border-radius: 99px; height: 6px; margin-bottom: 16px; }
  .progress-bar { background: linear-gradient(90deg, #2b6cb0, #63b3ed); height: 6px; border-radius: 99px; transition: width 0.3s; }
  .quiz-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .quiz-counter { font-size: 13px; color: #718096; font-weight: 600; }
  .quiz-school { font-size: 11px; background: #ebf8ff; color: #2b6cb0; padding: 3px 10px; border-radius: 20px; font-weight: 600; }
  .quiz-topic { font-size: 11px; background: #f0fff4; color: #276749; padding: 3px 10px; border-radius: 20px; font-weight: 600; margin-left: 4px; }

  .case-box { background: #fffbeb; border-left: 4px solid #f6ad55; border-radius: 8px; padding: 12px; margin-bottom: 16px; font-size: 13px; line-height: 1.7; color: #744210; }
  .case-box strong { display: block; font-size: 12px; color: #c05621; margin-bottom: 6px; }

  .question-card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 16px; }
  .question-text { font-size: 15px; line-height: 1.8; font-weight: 600; white-space: pre-line; }

  .options-list { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
  .option-btn { text-align: left; padding: 14px 16px; border-radius: 12px; border: 2px solid #e2e8f0; background: white; font-size: 14px; line-height: 1.6; cursor: pointer; transition: all 0.15s; color: #2d3748; }
  .option-btn:hover:not(:disabled) { border-color: #63b3ed; background: #ebf8ff; }
  .option-btn.correct { border-color: #38a169; background: #f0fff4; color: #276749; font-weight: 700; }
  .option-btn.wrong { border-color: #e53e3e; background: #fff5f5; color: #c53030; }
  .option-btn:disabled { cursor: default; }

  .explanation-box { background: #f7fafc; border-left: 4px solid #4299e1; border-radius: 8px; padding: 14px; margin-top: 12px; font-size: 13px; line-height: 1.8; color: #2d3748; display: none; }
  .explanation-box.show { display: block; }
  .explanation-box strong { color: #2b6cb0; font-size: 12px; display: block; margin-bottom: 4px; }

  .action-row { display: flex; gap: 10px; margin-top: 16px; }
  .next-btn { flex: 1; padding: 14px; background: #2b6cb0; color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; display: none; }
  .next-btn.show { display: block; }
  .bookmark-btn { padding: 14px 18px; background: white; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 20px; cursor: pointer; }
  .bookmark-btn.active { border-color: #f6ad55; background: #fffbeb; }

  /* 結果画面 */
  .result-card { background: white; border-radius: 16px; padding: 24px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 16px; }
  .score-circle { width: 140px; height: 140px; border-radius: 50%; margin: 0 auto 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 800; }
  .score-circle.great { background: linear-gradient(135deg, #f6ad55, #ed8936); color: white; }
  .score-circle.good { background: linear-gradient(135deg, #63b3ed, #3182ce); color: white; }
  .score-circle.ok { background: linear-gradient(135deg, #68d391, #38a169); color: white; }
  .score-pct { font-size: 40px; line-height: 1; }
  .score-sub { font-size: 14px; opacity: 0.9; }
  .result-breakdown { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 16px 0; }
  .breakdown-item { background: #f7fafc; border-radius: 8px; padding: 10px; text-align: center; }
  .breakdown-num { font-size: 22px; font-weight: 800; }
  .breakdown-num.correct { color: #38a169; }
  .breakdown-num.wrong { color: #e53e3e; }
  .breakdown-num.bookmark { color: #d69e2e; }
  .breakdown-label { font-size: 11px; color: #718096; margin-top: 2px; }

  .topic-results { background: white; border-radius: 16px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 16px; }
  .topic-results h3 { font-size: 14px; font-weight: 700; margin-bottom: 12px; color: #4a5568; }
  .topic-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
  .topic-row:last-child { border-bottom: none; }
  .topic-bar-wrap { flex: 1; margin: 0 12px; height: 6px; background: #e2e8f0; border-radius: 99px; overflow: hidden; }
  .topic-bar { height: 100%; border-radius: 99px; }

  .retry-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #e53e3e, #c53030); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
  .home-btn { width: 100%; padding: 14px; background: white; border: 2px solid #e2e8f0; color: #4a5568; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; }

  /* 途中再開カード */
  .resume-card { background: linear-gradient(135deg, #ebf8ff, #bee3f8); border: 2px solid #90cdf4; border-radius: 12px; padding: 14px 16px; margin-bottom: 16px; }
  .resume-card h3 { font-size: 14px; font-weight: 700; color: #2b6cb0; margin-bottom: 6px; }
  .resume-card p { font-size: 13px; color: #2c5282; margin-bottom: 12px; }
  .resume-card .resume-btns { display: flex; gap: 8px; }
  .resume-btn { flex: 1; padding: 10px; background: #2b6cb0; color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; touch-action: manipulation; }
  .resume-discard-btn { padding: 10px 14px; background: white; border: 2px solid #bee3f8; color: #4a5568; border-radius: 10px; font-size: 13px; cursor: pointer; touch-action: manipulation; }

  /* ブックマーク一覧 */
  .bookmark-list { display: flex; flex-direction: column; gap: 12px; }
  .bookmark-item { background: white; border-radius: 12px; padding: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); border-left: 4px solid #f6ad55; cursor: pointer; transition: background 0.15s, box-shadow 0.15s; }
  .bookmark-item:active { background: #fffbeb; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  .bookmark-item-meta { font-size: 11px; color: #718096; margin-bottom: 6px; }
  .bookmark-item-q { font-size: 14px; font-weight: 600; line-height: 1.5; }
  .bookmark-item-hint { font-size: 11px; color: #a0aec0; margin-top: 6px; }
  .empty-state { text-align: center; padding: 60px 20px; color: #a0aec0; }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

  /* 統計画面 */
  .analysis-card { background: white; border-radius: 12px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 12px; }
  .analysis-card h3 { font-size: 14px; font-weight: 700; color: #4a5568; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid #f0f0f0; }
</style>
</head>
<body>

<div class="header">
  <h1>🏥 WOC認定看護師 入試対策クイズ</h1>
  <p>皮膚・排泄ケア認定看護師教育課程</p>
</div>

<div class="tab-nav">
  <button class="tab-btn active" onclick="showTab('home', this)">🏠 ホーム</button>
  <button class="tab-btn" onclick="showTab('quiz', this)">📝 クイズ</button>
  <button class="tab-btn" onclick="showTab('bookmark', this)">⭐ 復習</button>
  <button class="tab-btn" onclick="showTab('stats', this)">📊 分析</button>
</div>

<!-- ホーム画面 -->
<div class="screen" id="screen-home" style="display:block">
  <div style="height:16px"></div>

  <!-- 途中再開カード -->
  <div class="resume-card" id="resume-card" style="display:none">
    <h3>⏸ 前回の続きがあります</h3>
    <p id="resume-info">読み込み中...</p>
    <div class="resume-btns">
      <button class="resume-btn" onclick="resumeQuiz()">続きから再開する ▶</button>
      <button class="resume-discard-btn" onclick="clearResume()">破棄</button>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-number" id="stat-total">0</div>
      <div class="stat-label">総問題数</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="stat-done">0</div>
      <div class="stat-label">解答済み</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="stat-correct" style="color:#38a169">0</div>
      <div class="stat-label">正解数</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="stat-accuracy" style="color:#d69e2e">-%</div>
      <div class="stat-label">正答率</div>
    </div>
  </div>

  <div class="filter-section">
    <h3>📚 出題範囲を選ぶ</h3>
    <div class="filter-chips" id="school-filters">
      <span class="chip selected" data-filter="all" onclick="setFilter(this,'school')">すべて</span>
    </div>
  </div>

  <div class="filter-section">
    <h3>🔖 テーマで絞る</h3>
    <div class="filter-chips" id="topic-filters">
      <span class="chip selected" data-topic="all" onclick="setFilter(this,'topic')">すべて</span>
    </div>
  </div>

  <div class="filter-section">
    <h3>⚙️ 出題順</h3>
    <div class="filter-chips">
      <span class="chip selected" data-mode="order" onclick="setMode(this,'mode')">順番通り</span>
      <span class="chip" data-mode="random" onclick="setMode(this,'mode')">ランダム</span>
      <span class="chip" data-mode="wrong" onclick="setMode(this,'mode')">間違えた問題のみ</span>
      <span class="chip" data-mode="bookmark" onclick="setMode(this,'mode')">ブックマークのみ</span>
    </div>
  </div>

  <button class="start-btn" onclick="startQuiz()">クイズを開始する ▶</button>
</div>

<!-- クイズ画面 -->
<div class="screen" id="screen-quiz">
  <div style="height:16px"></div>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progress-bar" style="width:0%"></div>
  </div>
  <div class="quiz-meta">
    <span class="quiz-counter" id="quiz-counter">1 / 10</span>
    <span>
      <span class="quiz-school" id="quiz-school">清瀬2025</span>
      <span class="quiz-topic" id="quiz-topic">皮膚解剖</span>
    </span>
  </div>
  <div class="case-box" id="case-box" style="display:none">
    <strong id="case-name"></strong>
    <span id="case-text"></span>
  </div>
  <div class="question-card">
    <p class="question-text" id="question-text"></p>
    <div class="options-list" id="options-list"></div>
    <div class="explanation-box" id="explanation-box">
      <strong>💡 解説</strong>
      <span id="explanation-text"></span>
    </div>
  </div>
  <div class="action-row">
    <button class="bookmark-btn" id="bookmark-btn" onclick="toggleBookmark()">☆</button>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">次の問題 →</button>
  </div>
</div>

<!-- 結果画面 -->
<div class="screen" id="screen-result">
  <div style="height:16px"></div>
  <div class="result-card">
    <div class="score-circle great" id="score-circle">
      <div class="score-pct" id="score-pct">80%</div>
      <div class="score-sub" id="score-sub">8/10問</div>
    </div>
    <h2 id="score-message" style="font-size:18px;margin-bottom:8px">お疲れ様でした！</h2>
    <p id="score-comment" style="font-size:13px;color:#718096;line-height:1.6"></p>
    <div class="result-breakdown">
      <div class="breakdown-item">
        <div class="breakdown-num correct" id="res-correct">8</div>
        <div class="breakdown-label">正解</div>
      </div>
      <div class="breakdown-item">
        <div class="breakdown-num wrong" id="res-wrong">2</div>
        <div class="breakdown-label">不正解</div>
      </div>
      <div class="breakdown-item">
        <div class="breakdown-num bookmark" id="res-bookmark">0</div>
        <div class="breakdown-label">ブックマーク</div>
      </div>
    </div>
  </div>

  <div class="topic-results" id="topic-results-section">
    <h3>📊 テーマ別正答率</h3>
    <div id="topic-results-list"></div>
  </div>

  <button class="retry-btn" onclick="retryWrong()">❌ 間違えた問題を復習する</button>
  <button class="home-btn" onclick="goHome()">🏠 ホームに戻る</button>
</div>

<!-- ブックマーク画面 -->
<div class="screen" id="screen-bookmark">
  <div style="height:16px"></div>
  <div class="bookmark-list" id="bookmark-list">
    <div class="empty-state">
      <div class="icon">⭐</div>
      <p>ブックマークした問題がここに表示されます</p>
    </div>
  </div>
</div>

<!-- 分析画面 -->
<div class="screen" id="screen-stats">
  <div style="height:16px"></div>
  <div class="analysis-card">
    <h3>📚 学校別 問題数</h3>
    <div id="school-stats-list"></div>
  </div>
  <div class="analysis-card">
    <h3>🎯 テーマ別 正答率</h3>
    <div id="topic-stats-list"></div>
  </div>
  <div class="analysis-card">
    <h3>💡 苦手テーマ TOP3</h3>
    <div id="weak-topics-list"></div>
  </div>
</div>

<script>
// ===== 問題データ =====
const questions = [
  { id:1, school:"清瀬2025", year:2025, topic:"皮膚解剖", question:"問題1｜表皮の解剖について上層側からの順番として正しいものはどれか。", options:["1. 角質層 → 基底層 → 顆粒層 → 有棘層","2. 角質層 → 顆粒層 → 有棘層 → 基底層","3. 角質層 → 有棘層 → 基底層 → 顆粒層","4. 角質層 → 有棘層 → 顆粒層 → 基底層"], answer:1, explanation:"表皮は上層から「角質層→顆粒層→有棘層→基底層」。基底層で細胞が産生され、上層へ移動しながら角化が進む。" },
  { id:2, school:"清瀬2025", year:2025, topic:"皮膚解剖", question:"問題2｜皮膚の付属器について誤っているものはどれか。\na．汗腺からは皮脂が分泌される。\nb．毛脂腺は腋窩に多く分布している。\nc．エクリン腺は全身の皮膚に分布している。\nd．アポクリン腺は体温調節に関与している。", options:["1. a, b","2. a, d","3. b, c","4. c, d"], answer:1, explanation:"a誤：汗腺からは汗が分泌（皮脂は皮脂腺）。d誤：体温調節はエクリン腺。アポクリン腺は体臭に関係。" },
  { id:3, school:"清瀬2025", year:2025, topic:"皮膚病態", question:"問題3｜皮膚の病態として正しいものはどれか。\na. 水疱とは膿が貯留した隆起病変である。\nb. びらんとは表皮の欠損である。\nc. 紫斑は硝子圧法（ガラス圧迫法）で消失しない。\nd. 紅斑とは真皮の出血により紅色となることを示す。", options:["1. a, b","2. a, d","3. b, c","4. c, d"], answer:2, explanation:"b正：びらんは表皮のみの欠損。c正：紫斑は出血のため硝子圧法で消失しない。a誤：水疱は漿液貯留（膿は膿疱）。d誤：紅斑は血管拡張による発赤。" },
  { id:4, school:"清瀬2025", year:2025, topic:"皮膚感染", question:"問題4｜蜂窩織炎の病態について誤っているものはどれか。", options:["1. 熱感を伴わない。","2. 四肢に多く見られる。","3. 壊死性筋膜炎に移行することがある。","4. 原因菌の1つに黄色ブドウ球菌がある。"], answer:0, explanation:"蜂窩織炎は炎症の4徴（発赤・腫脹・熱感・疼痛）を伴う。熱感を伴わないは誤り。" },
  { id:5, school:"清瀬2025", year:2025, topic:"褥瘡", question:"問題5｜ブレーデンスケールの評価項目について誤っているものはどれか。", options:["1. 知覚の認知","2. 活動性","3. 病的骨突出","4. 摩擦とずれ"], answer:2, explanation:"ブレーデンスケール6項目：知覚の認知・湿潤・活動性・可動性・栄養状態・摩擦とずれ。「病的骨突出」はOHスケールの項目。" },
  { id:6, school:"清瀬2025", year:2025, topic:"褥瘡・MDRPU", question:"問題6｜弾性ストッキングによるMDRPU予防ケアについて正しいものはどれか。\na．皮膚の観察は1日2回以上行う。\nb．後脛骨動脈の触知を確認する。\nc．創傷被覆材の使用は保険適応となる。\nd．弾性ストッキングの着脱は最低限にする。", options:["1. a, b","2. a, d","3. b, c","4. c, d"], answer:0, explanation:"a正：1日2回以上の皮膚観察。b正：血流確認のため後脛骨動脈触知。c誤：MDRPU予防の被覆材は保険適応外。d誤：着脱して皮膚観察が重要。" },
  { id:7, school:"清瀬2025", year:2025, topic:"スキン-テア", question:"問題7｜STARスキン-テア分類システムについて誤っているものはどれか。\na．カテゴリー1aは創縁を正常な位置に戻すことができない状態。\nb．カテゴリー2bは皮弁の色が黒ずんでいる状態。\nc．カテゴリー3は皮弁が完全に欠損した状態。\nd．カテゴリー4は皮下組織に損傷が及んだ状態。", options:["1. a, b","2. a, d","3. b, c","4. c, d"], answer:1, explanation:"a誤：1aは皮弁を元の位置に戻せる状態。d誤：STARは1a・1b・2a・2b・3の5カテゴリーで、4は存在しない。" },
  { id:8, school:"清瀬2025", year:2025, topic:"創傷管理", question:"問題9｜Wound hygieneの4つのステップで正しい順番はどれか。", options:["1. 洗浄 → 創縁の新鮮化 → 創傷の被覆 → 保湿","2. デブリードマン → 消毒 → 洗浄 → 創傷の被覆","3. 洗浄 → デブリードマン → 創縁の新鮮化 → 創傷の被覆","4. 消毒 → デブリードマン → 創傷の被覆 → 保護"], answer:2, explanation:"Wound hygiene 4ステップ：洗浄→デブリードマン→創縁の新鮮化→創傷の被覆。消毒は行わない。" },
  { id:9, school:"清瀬2025", year:2025, topic:"創傷被覆材", question:"問題10｜創傷被覆剤の特徴として正しいものはどれか。\na．ハイドロファイバー ― 止血効果\nb．ハイドロジェル ― 滲出液によってゲル化\nc．ポリウレタンフォーム ― 滲出液があと戻りしない\nd．ハイドロコロイド ― 親水性ポリマーを含有", options:["1. a, b","2. a, d","3. b, c","4. c, d"], answer:3, explanation:"c正：PUフォームは逆流防止。d正：ハイドロコロイドは親水性ポリマー含有。a誤：止血効果はアルギン酸塩。b誤：ハイドロジェルは水分補給用。" },
  { id:10, school:"清瀬2025", year:2025, topic:"創傷管理", question:"問題11｜局所陰圧閉鎖療法について誤っているものはどれか。", options:["1. 創傷治癒促進のための化学的療法である。","2. 悪性腫瘍がある創傷は禁忌である。","3. 血管新生の促進効果がある。","4. 在宅での保険算定が可能である。"], answer:0, explanation:"NPWTは陰圧（物理的刺激）を用いた物理的療法。化学的療法ではない。" },
  { id:11, school:"清瀬2025", year:2025, topic:"消化管解剖", question:"問題12｜上腸管膜動脈の支配ではないものはどれか。\na. 回腸　b. 横行結腸　c. 下行結腸　d. 直腸", options:["1. a, b","2. a, d","3. b, c","4. c, d"], answer:3, explanation:"上腸管膜動脈は小腸〜横行結腸を支配。下行結腸・直腸は下腸管膜動脈の支配。" },
  { id:12, school:"清瀬2025", year:2025, topic:"消化管・腫瘍", question:"問題13｜大腸癌からの転移のうち血行性転移ではないものはどれか。", options:["1. 骨","2. 脳","3. 肝臓","4. 腹膜"], answer:3, explanation:"腹膜転移は播種性転移（腹腔内への直接散布）。骨・脳・肺・肝臓は血行性転移。" },
  { id:13, school:"清瀬2025", year:2025, topic:"ストーマ・解剖", question:"問題14｜直腸癌手術に関連した自律神経の組み合わせで誤っているものはどれか。", options:["1. 腰内臓神経 ― 交感神経","2. 上下腹神経叢 ― 交感神経","3. 骨盤内臓神経 ― 副交感神経","4. 下腹神経 ― 副交感神経"], answer:3, explanation:"下腹神経は交感神経（腰内臓神経から続く）。骨盤内臓神経（S2〜S4）が副交感神経。" },
  { id:14, school:"清瀬2025", year:2025, topic:"泌尿器", question:"問題15｜膀胱癌について誤っているものはどれか。", options:["1. 男女比では男性が多い。","2. 尿路上皮癌が多い。","3. TNM分類のT1は筋層に浸潤を示す。","4. 初発症状に無症候性肉眼的血尿がみられる。"], answer:2, explanation:"T1は粘膜下層への浸潤。筋層浸潤はT2。" },
  { id:15, school:"清瀬2025", year:2025, topic:"ストーマ", question:"問題16｜ストーマ造設の術式で誤っているものはどれか。", options:["1. ハルトマン術","2. 回腸導管造設術","3. 低位前方切除術","4. 腹会陰式直腸切断術"], answer:2, explanation:"低位前方切除術は肛門温存術式（永久ストーマを造設しない）。" },
  { id:16, school:"清瀬2025", year:2025, topic:"ストーマ・制度", question:"問題17｜ストーマに関する診療報酬で誤っているものはどれか。", options:["1. ストーマ合併症加算は65点算定できる。","2. ストーマ処置料はストーマ2個の場合は140点算定できる。","3. 在宅療養指導料は初めて指導を行った月は2回算定できる。","4. 人工肛門・人工膀胱造設術前処置加算は450点算定できる。"], answer:1, explanation:"ストーマ処置料：1個70点、2個以上100点（140点ではない）。" },
  { id:17, school:"清瀬2025", year:2025, topic:"炎症性腸疾患", question:"問題18｜炎症性腸疾患について誤っているものはどれか。", options:["1. クローン病 ― 肛門病変の併発が多い","2. クローン病 ― 全消化管に病変を生じる","3. 潰瘍性大腸炎 ― 粘血便の発現頻度が高い","4. 潰瘍性大腸炎 ― 内視鏡所見で敷石像病変を呈する"], answer:3, explanation:"敷石像はクローン病の内視鏡所見。潰瘍性大腸炎は連続性粘膜障害が特徴。" },
  { id:18, school:"清瀬2025", year:2025, topic:"ストーマ装具", question:"問題19｜面板のストーマ孔で誤っているものはどれか。", options:["1. 無孔","2. 既成孔","3. 自在孔","4. 自由開孔"], answer:3, explanation:"ストーマ孔の種類は無孔・既成孔・自在孔の3種類。「自由開孔」は存在しない。" },
  { id:19, school:"清瀬2025", year:2025, topic:"ストーマ・心理", question:"問題20｜危機モデルの組み合わせで誤っているものはどれか。", options:["1. ベナー ― 危機問題解決過程モデル","2. コーン ― 障害受容のプロセスモデル","3. カプラン ― 危機状況から精神障害に向かうプロセスモデル","4. フィンク ― 危機から適応へと向かう障害受容のプロセスモデル"], answer:0, explanation:"ベナーは看護師の熟達理論（ノービス→エキスパート）。危機問題解決過程モデルとは関係ない。" },
  { id:20, school:"清瀬2025", year:2025, topic:"ストーマ合併症", question:"問題21｜ストーマの晩期合併症で誤っているものはどれか。\na. ストーマ壊死　b. ストーマ周囲肉芽腫　c. ストーマ傍ヘルニア　d. ストーマ粘膜皮膚離開", options:["1. a, b","2. a, d","3. b, c","4. c, d"], answer:1, explanation:"ストーマ壊死・粘膜皮膚離開は術後早期合併症。晩期：傍ヘルニア・脱出・狭窄・周囲肉芽腫など。" },
  { id:21, school:"清瀬2025", year:2025, topic:"尿路ストーマ", question:"問題22｜尿路ストーマのケアについて正しいものはどれか。\na. 術直後は尿管カテーテルからの尿流出確認。\nb. 腎瘻はカテーテルをキャップで止めて入浴。\nc. 偽上皮腫性肥厚は面板ストーマ孔を大きくカット。\nd. 洗浄はストーマ近接部から外周へすすめる。", options:["1. a, b","2. a, d","3. b, c","4. c, d"], answer:1, explanation:"a正：術後は尿流出確認が重要。d正：洗浄は近接部→外側へ。b誤：腎瘻患者はカテーテルを止めてはいけない。c誤：偽上皮腫性肥厚は孔を小さくする。" },
  { id:22, school:"清瀬2025", year:2025, topic:"尿路ストーマ", question:"問題23｜ストーマ静脈瘤について誤っているものはどれか。", options:["1. 治療方法に硬化療法がある。","2. 右側結腸ストーマに生じやすい。","3. 門脈圧亢進症のある患者に起こりやすい。","4. 硝子板圧迫で発赤が消退する。"], answer:1, explanation:"ストーマ静脈瘤は左側結腸ストーマに多い（門脈-体静脈短絡が形成されやすい）。" },
  { id:23, school:"清瀬2025", year:2025, topic:"泌尿器解剖", question:"問題24｜腎臓の解剖生理について誤っているものはどれか。", options:["1. 右腎は左腎より高い位置にある。","2. 腎門部には神経が出入りしている。","3. 成人の1日の糸球体濾過量は約150Lである。","4. ひとつの腎臓には約100万個のネフロンが存在する。"], answer:0, explanation:"右腎は肝臓により圧迫されるため、左腎より低い位置にある。" },
  { id:24, school:"清瀬2025", year:2025, topic:"下部尿路障害", question:"問題25｜下部尿路障害で使用する薬剤の組み合わせで正しいものはどれか。\na. 尿意切迫 ― 利尿剤　b. 前立腺肥大 ― α1遮断薬\nc. 溢流性尿失禁 ― Ca拮抗薬　d. 過活動膀胱 ― β3受容体作動薬", options:["1. a, b","2. b, d","3. b, c","4. c, d"], answer:1, explanation:"b正：前立腺肥大→α1遮断薬（タムスロシン等）。d正：過活動膀胱→β3受容体作動薬（ミラベグロン・ビベグロン）。a誤：尿意切迫（過活動膀胱）→抗ムスカリン薬またはβ3作動薬が正しい。c誤：溢流性尿失禁→α1遮断薬・コリン作動薬が正しい（Ca拮抗薬は膀胱収縮を抑制するため不適切）。" },
  { id:25, school:"清瀬2025", year:2025, topic:"排尿アセスメント", question:"問題26｜尿検査の正常値について正しいものはどれか。\na. 尿たんぱく 100〜150mg/日　b. 尿比重 1.003〜1.03程度\nc. PHは弱アルカリ性　d. 尿糖は200mg/dl以下", options:["1. a, b","2. a, d","3. b, c","4. c, d"], answer:0, explanation:"a正：尿たんぱく正常≤150mg/日。b正：尿比重1.003〜1.030。c誤：尿は弱酸性（pH5〜7）。d誤：尿糖は通常0（陰性）。" },
  { id:26, school:"清瀬2025", year:2025, topic:"排尿アセスメント", question:"問題27｜排尿日誌について誤っているものはどれか。", options:["1. 飲水量を記載する。","2. 観察は最低24時間行い記録する。","3. おむつ使用患者は対象としない。","4. 失禁のタイプが推測できる。"], answer:2, explanation:"おむつ使用患者も排尿日誌の対象。おむつ重量測定で排尿量を推定できる。" },
  { id:27, school:"清瀬2025", year:2025, topic:"IAD", question:"問題28｜IADの好発部位で誤っているものはどれか。", options:["1. 下腹部","2. 会陰部","3. 肛門周囲","4. 大腿部"], answer:0, explanation:"IADの好発部位は会陰部・肛門周囲・臀部・鼠径部・大腿内側など。下腹部は主な好発部位ではない。" },
  { id:28, school:"清瀬2025", year:2025, topic:"カテーテル管理", question:"問題29｜尿道留置カテーテルの管理について誤っているものはどれか。\na. 挿入時は未滅菌手袋　b. 蓄尿バックは膀胱より低い位置\nc. 1000ml以上の尿量が得られるよう水分摂取を勧める　d. 男性は大腿内側に固定", options:["1. a, b","2. a, d","3. b, c","4. c, d"], answer:1, explanation:"a誤：カテーテル挿入は無菌操作→滅菌手袋。d誤：男性は下腹部または大腿前面に固定（内側は禁忌）。" },
  { id:29, school:"清瀬2025", year:2025, topic:"制度・診療報酬", question:"問題30｜排尿自立支援加算について正しいものはどれか。\na. 算定期間は12週を限度　b. 加算は250点\nc. 薬剤師が必須構成員　d. 排尿ケアマニュアルを作成", options:["1. a, b","2. a, d","3. b, c","4. c, d"], answer:1, explanation:"a正：12週（84日）が限度。d正：マニュアル作成が施設基準の要件。b誤：200点（外来50点）。c誤：医師・看護師・PT or OTが必須。薬剤師は任意。" },
  { id:30, school:"清瀬2025", year:2025, topic:"排便管理", question:"問題31｜便秘のケアについて正しいものはどれか。\na. 薬剤の使用を優先的に試みる　b. 朝食後に胃・結腸反射が起きやすい\nc. 直腸糞便塞栓は摘便を行う　d. 直腸肛門角が鋭角となる前傾姿勢", options:["1. a, b","2. a, d","3. b, c","4. c, d"], answer:2, explanation:"b正：胃・結腸反射は朝食後に起きやすい。c正：宿便には摘便が有効。a誤：生活習慣改善が優先。d誤：直腸肛門角は鈍角となる前傾姿勢（ロダンの考える人）が正しい。" },
  { id:31, school:"清瀬2025", year:2025, topic:"排便管理", question:"問題32｜薬剤性便秘の原因となりやすい薬剤で誤っているものはどれか。", options:["1. 向精神薬","2. オピオイド","3. 抗コリン薬","4. ルビプロストン"], answer:3, explanation:"ルビプロストン（アミティーザ）は腸管分泌促進薬→便秘の治療薬。向精神薬・オピオイド・抗コリン薬は便秘の原因となる。" },
  { id:32, school:"清瀬2025", year:2025, topic:"IAD・スキンケア", question:"問題33｜失禁患者のケアで誤っているものはどれか。\na. 頻回な便汚染のたびに石鹸で洗浄　b. 洗浄後の保湿は2日に1回程度\nc. ストーマ用粉状皮膚保護剤はアルカリ性を緩衝する目的　d. おむつ困難時はコンドーム型収尿器を検討", options:["1. a, b","2. a, d","3. b, c","4. c, d"], answer:0, explanation:"a誤：頻回な石鹸洗浄は皮膚バリア機能を損傷。低刺激洗浄剤を使用し最小限に。b誤：保湿は少なくとも1日1回以上が推奨。" },
  { id:33, school:"清瀬2025", year:2025, topic:"IAD", question:"問題34｜IADのリスク因子で誤っているものはどれか。", options:["1. 低栄養状態","2. ステロイド使用中","3. 経皮水分蒸散量の低下","4. 尿・便以外の排泄物の接触"], answer:2, explanation:"TEWLの低下はバリア機能が保たれていることを示す。IADリスクはTEWL増加（バリア機能低下）。" },
  { id:34, school:"清瀬2025", year:2025, topic:"失禁ケア用品", question:"問題35｜失禁ケア用品で誤っているものはどれか。", options:["1. 肛門パウチは単品系平面装具を用いる。","2. ポリエステル繊維綿は尿を速やかに吸収する。","3. 下痢便ドレナージチューブは最長29日まで連続使用が可能。","4. 軟便吸収パッドはろ過作用により目詰まりしにくく水分を吸収しやすい。"], answer:3, explanation:"軟便吸収パッドは目詰まりしやすいのが特徴（液体+固形混在の軟便でフィルターが詰まる）。" },
  // 事例問題
  { id:35, school:"清瀬2025", year:2025, topic:"褥瘡・DESIGN-R", type:"case", caseName:"事例A：Aさん（パーキンソン病・仙骨部褥瘡）", caseText:"A氏 70歳代男性。パーキンソン病。仙骨部：縦2cm×横4cm・皮下組織までの損傷。赤色肉芽が全面、壊死組織なし、滲出液は淡黄色・少量（ガーゼ1日1回交換）。ポケットなし。感染徴候なし。", question:"設問1｜入院時の仙骨部褥瘡のDESIGN-R®2020評価について正しいものはどれか。", options:["1. D3-e1s6i0g1n0p0：8点","2. d2-e3s8i0g0n0p0：11点","3. D3-e3s6i0g0n0p0：9点","4. D3-e2s8i0G6n0p0：16点"], answer:0, explanation:"皮下組織までの損傷→D3（大文字。d2は真皮まで、D3は皮下組織まで）。滲出液少量（1回/日）→e1。面積2×4=8cm²→s6。感染なし→i0。赤色肉芽全面（90%以上）→g1。壊死なし→n0。ポケットなし→p0。※DESIGN-R 2020では深さ(d/D)は合計点に含まない。合計：e1+s6+i0+g1+n0+p0=8点。" },
  { id:36, school:"清瀬2025", year:2025, topic:"褥瘡治療", type:"case", caseName:"事例A：Aさん（パーキンソン病・仙骨部褥瘡）", question:"設問2｜入院時の仙骨部褥瘡の局所治療について正しいものはどれか。", options:["1. ブロメラインを塗布する。","2. ハイドロジェルを塗布する。","3. ハイドロコロイドを貼付する。","4. ジメチルイソプロピルアズレンを塗布する。"], answer:2, explanation:"赤色肉芽全面・壊死組織なし・滲出液少量→ハイドロコロイドで湿潤環境を保つのが適切。ブロメラインは壊死組織除去用（不要）。" },
  { id:37, school:"清瀬2025", year:2025, topic:"褥瘡・栄養", type:"case", caseName:"事例A：Aさん（パーキンソン病・仙骨部褥瘡）", question:"設問3｜褥瘡治癒に向けて摂取すべき栄養素のうち適切ではないものはどれか。", options:["1. 亜鉛","2. アルギニン","3. ビタミンA","4. アスコルビン酸（ビタミンC）"], answer:2, explanation:"褥瘡ケアで特に推奨される栄養素は亜鉛・アルギニン・ビタミンC（アスコルビン酸）。ビタミンAは粘膜保護には重要だが、褥瘡ガイドラインでの優先度は低い。" },
  { id:38, school:"清瀬2025", year:2025, topic:"褥瘡・洗浄", type:"case", caseName:"事例A：Aさん（入院14日目・クリティカルコロナイゼーション疑い）", caseText:"入院14日目：創面にぬめりあり、滲出液増加、肉芽は浮腫状。膿なし。", question:"設問4｜入院14日目の褥瘡の洗浄方法について正しいものはどれか。\na. 圧をかけないよう洗浄　b. 次亜塩素酸ナトリウムで消毒\nc. 界面活性剤含有洗浄剤で洗浄　d. 創周囲皮膚も含め広範囲（10〜20cm）を洗浄", options:["1. a, b","2. a, d","3. b, c","4. c, d"], answer:3, explanation:"クリティカルコロナイゼーション（バイオフィルム疑い）にはc正：界面活性剤含有洗浄剤、d正：広範囲洗浄が有効。a誤：適度な圧で洗浄がバイオフィルム除去に有効。b誤：次亜塩素酸は組織毒性あり。" },
  { id:39, school:"清瀬2025", year:2025, topic:"褥瘡治療", type:"case", caseName:"事例A：Aさん（入院14日目・クリティカルコロナイゼーション疑い）", question:"設問5｜入院14日目の褥瘡の局所治療について正しいものはどれか。\na. 精製白糖・ポビドンヨード塗布　b. 酸化亜鉛塗布\nc. 親水性メンブラン塗布　d. 銀含有ハイドロファイバー使用", options:["1. a, b","2. a, d","3. b, c","4. c, d"], answer:3, explanation:"クリティカルコロナイゼーションにはc正：親水性メンブラン（バイオフィルム除去）、d正：銀含有ハイドロファイバー（抗菌作用）が有効。" },
  { id:40, school:"清瀬2025", year:2025, topic:"ストーマ管理", type:"case", caseName:"事例B：Bさん（子宮頸がん→結腸ストーマ・粘膜皮膚離開）", caseText:"B氏 40歳代女性。下行結腸単孔式ストーマ（縦36×横35×高さ8mm）。術後7日目：粘膜皮膚離開（3〜8時方向・幅5mm・深さ3mm）。平坦腹壁。排泄物が1cm潜り込み。", question:"設問1｜粘膜皮膚離開の局所処置について正しいものはどれか。\na. 温めた生理食塩水で洗浄　b. ストーマ径より7mm大きくカット\nc. ハイドロファイバーを創腔に充填　d. ストーマパウダーを散布", options:["1. a, b","2. a, d","3. b, c","4. c, d"], answer:3, explanation:"c正：ハイドロファイバーで湿潤環境保持。d正：ストーマパウダーで創面保護・装具密着向上。b誤：ストーマ径+3mmが基本（7mmは大きすぎ）。" },
  { id:41, school:"清瀬2025", year:2025, topic:"ストーマ装具", type:"case", caseName:"事例B：Bさん（子宮頸がん→結腸ストーマ）", question:"設問2｜術後7日目のB氏に使用するストーマ装具について正しいものはどれか。", options:["1. 平面装具","2. 凹面型装具","3. 硬性凸面型装具","4. 軟性凸面型装具"], answer:3, explanation:"ストーマ高さ8mm（低ストーマ）・平坦腹壁・排泄物の潜り込みあり→凸面型が必要。腹壁が柔らかいため軟性凸面型が適切。" },
  { id:42, school:"清瀬2025", year:2025, topic:"ストーマサイトマーキング", type:"case", caseName:"事例B：Bさん（尿管皮膚瘻追加造設）", question:"設問3｜手術前日のストーマサイトマーキングで誤っているものはどれか。", options:["1. 腹直筋外にマーキングする。","2. 前腋窩線より内側でマーキングする。","3. コロストミーより2〜3cm足側にマーキングする。","4. コロストミーから7〜9cm離れた位置にマーキングする。"], answer:0, explanation:"ストーマサイトマーキングの原則：腹直筋内にマーキングする（腹直筋外は傍ヘルニアリスク増大）。" },
  { id:43, school:"清瀬2025", year:2025, topic:"尿路ストーマ管理", type:"case", caseName:"事例B：Bさん（尿管皮膚瘻・退院指導）", question:"設問4｜退院時のストーマ管理について正しいものはどれか。", options:["1. 身体障害者手帳の再申請を行うよう説明する。","2. 2つのストーマを同日交換する場合はコロストミーから交換するよう説明する。","3. 尿管皮膚瘻のカテーテル先端はストーマ装具の逆流防止弁を超えた先に留置するよう説明する。","4. 片方から尿流出があればもう片方がなくても良いことを説明する。"], answer:2, explanation:"c正：カテーテル先端は逆流防止弁より奥に留置することで尿が正常流出する。b誤：尿路ストーマ（清潔な方）→消化管ストーマの順に交換。d誤：両側の尿流出確認が必須。" },
  { id:44, school:"清瀬2025", year:2025, topic:"ストーマ装具選択", type:"case", caseName:"事例B：Bさん（装具選択）", question:"設問5｜B氏が希望する退院後の装具について誤っているものはどれか。", options:["1. ポリマーブレンド系の皮膚保護剤を選択する。","2. セラミドが配合されている皮膚保護剤を選択する。","3. カラヤガムのみで構成された皮膚保護剤を選択する。","4. 疎水性ポリマーが配合されている皮膚保護剤を選択する。"], answer:2, explanation:"カラヤガムは尿・アルカリ性排泄物に弱く、耐久性が低い。5〜7日交換を希望する尿路ストーマには不適切。ポリマーブレンド系・セラミド・疎水性ポリマーは耐久性・保護力が高い。" },
  { id:45, school:"清瀬2025", year:2025, topic:"排尿障害", type:"case", caseName:"事例C：Cさん（前立腺全摘後尿失禁）", caseText:"C氏 70歳代男性。腹腔鏡下前立腺全摘術後。カテーテル抜去後から尿失禁。尿意あり・立位歩行時に失禁。排尿回数9回/日、排尿量170ml/回、失禁量50〜120ml、残尿0ml。", question:"設問1｜C氏の排尿障害について正しいものはどれか。", options:["1. 腹圧性尿失禁","2. 切迫性尿失禁","3. 溢流性尿失禁","4. 機能性尿失禁"], answer:0, explanation:"前立腺全摘後の括約筋機能不全による腹圧性尿失禁。立位・歩行時（腹圧上昇時）に失禁、残尿なし、尿意ありが特徴。" },
  { id:46, school:"清瀬2025", year:2025, topic:"排尿障害", type:"case", caseName:"事例C：Cさん（前立腺全摘後尿失禁）", question:"設問2｜C氏に出現する可能性がある症状について正しいものはどれか。", options:["1. 便失禁することがある。","2. 残尿が増えることがある。","3. 尿意がなく失禁することがある。","4. 安静臥床時に失禁することがある。"], answer:0, explanation:"前立腺全摘術では骨盤神経叢の損傷により直腸機能・肛門括約筋にも影響が出ることがある。腹圧性尿失禁は体動時に生じるため安静時失禁は少なく、残尿もなく、尿意は保たれる。" },
  { id:47, school:"清瀬2025", year:2025, topic:"排尿ケア", type:"case", caseName:"事例C：Cさん（前立腺全摘後尿失禁）", question:"設問3｜尿失禁に対する看護ケアで誤っているものはどれか。", options:["1. 腹筋を鍛えるよう説明する。","2. 体重を減量する必要性を説明する。","3. 失禁は6か月〜1年で改善する可能性が高いことを説明する。","4. 起き上がりの動作には肘をつきながら上体を起こす方法を説明する。"], answer:0, explanation:"腹筋トレーニングは腹圧を上昇させるため腹圧性尿失禁には逆効果。骨盤底筋訓練が第一選択。腹圧を上げない動作指導（肘をつく起き上がり）は正しい。" },
  { id:48, school:"清瀬2025", year:2025, topic:"失禁ケア用品", type:"case", caseName:"事例C：Cさん（前立腺全摘後尿失禁）", question:"設問4｜C氏の失禁に対する用具として正しいものはどれか。\na. コンドーム型男性用収尿器　b. 尿取りパッド\nc. コールセンサー付き使い捨て尿吸収パッドシステム　d. 間欠自己導尿セット", options:["1. a, b","2. a, d","3. b, c","4. c, d"], answer:0, explanation:"腹圧性尿失禁（活動時少量〜中等量失禁）にはa：コンドーム型収尿器・b：尿取りパッドが適切。残尿なし→間欠導尿不要。尿意あり→コールセンサー不要。" },
  { id:49, school:"清瀬2025", year:2025, topic:"骨盤底筋訓練", type:"case", caseName:"事例C：Cさん（前立腺全摘後尿失禁）", question:"設問5｜C氏への骨盤底筋訓練で誤っているものはどれか。", options:["1. 骨盤底筋を早く締めるよう説明する。","2. 腹筋に力を入れるよう説明する。","3. 骨盤底筋を5〜10秒締め続けるよう説明する。","4. 肛門内に指導者の指を挿入し収縮する力と筋肉の動きを評価する。"], answer:1, explanation:"骨盤底筋訓練では腹筋・殿筋・内転筋に力を入れないことが重要。腹圧をかけると効果が減弱する。速く締める（速筋）と保持する（遅筋）両方のトレーニングを行う。" },
  { id:50, school:"福岡", year:2024, topic:"皮膚生理", question:"加齢に伴う皮膚変化について正しい組み合わせはどれか。\na. 汗腺の萎縮\nb. 毛包数の増加\nc. 爪床への血流増加\nd. 経皮水分蒸散量（TEWL）の増加", options:["1. a, b", "2. a, d", "3. b, c", "4. c, d"], answer:1, explanation:"正解：a, d。a正：加齢により汗腺数・機能が低下し萎縮する。d正：加齢でセラミドが減少しバリア機能が低下するため、TEWLは増加する。b誤：毛包数は加齢で減少する。c誤：爪床血流は加齢で低下する。" },
  { id:51, school:"福岡", year:2024, topic:"創傷管理", question:"クリティカルコロナイゼーション（臨界的定着）の説明で正しいのはどれか。\n1. 創に細菌が存在するだけで増殖しない状態\n2. 増殖性をもつ細菌が創に付着しているが宿主に害を及ぼさない状態\n3. 増殖する細菌が組織内部に侵入して宿主に実害（深部感染）を及ぼす状態\n4. 創感染に移行しそうな状態、または炎症反応により創治癒が遅滞した状態", options:["1", "2", "3", "4"], answer:3, explanation:"正解：4。クリティカルコロナイゼーションとは、細菌が創に定着・増殖し、深部感染には至らないが宿主の免疫応答を引き起こし創治癒を遅らせている状態。バイオフィルム形成が関与することが多い。1はコンタミネーション、2はコロナイゼーション、3はローカルインフェクション（局所感染）の説明。" },
  { id:52, school:"福岡", year:2024, topic:"褥瘡・DESIGN-R", question:"DESIGN-R®2020について、正しいものはどれか。\n1. 全7項目を合算し算定する\n2. 壊死があれば、Size（大きさ）はd/Uで潰瘍深度なしと評価する\n3. Necrotic tissue（壊死組織）は病態が混在している場合、全体的に多い病態をもって評価する\n4. Granulation（肉芽組織）でGBは良性肉芽が全く形成されていないと評価する", options:["1", "2", "3", "4"], answer:2, explanation:"正解：3。壊死組織が混在している場合は、より重症側（多い病態）で評価する。1誤：DESIGN-Rは大文字（重症）と小文字（軽症）の合計点で評価し、深さDは合計に含めない場合もある。2誤：壊死がある場合でもSizeは実測する（ただしDTIや閉鎖創はU評価）。4誤：GBは良性肉芽が全面→g0、全く形成されない→g6（最重症）で評価する。" },
  { id:53, school:"福岡", year:2024, topic:"消化管解剖", question:"消化管の解剖生理について正しい組み合わせはどれか。\na. 小腸には消化作用、吸収作用、自己免疫作用がある\nb. 胆汁中に膵臓で分泌された胆汁酸塩は十二指腸で吸収され、再び肝臓で胆汁の合成に利用される\nc. 横行結腸・S状結腸は後腹膜に固定されているため、腸管外へ引き出しにくい\nd. 大腸の腸管の表面には結腸紐、結腸膨起、腹膜垂がある", options:["1. a, b", "2. a, d", "3. b, c", "4. c, d"], answer:1, explanation:"正解：a, d。a正：小腸は消化・吸収・免疫（パイエル板）機能を持つ。d正：大腸表面には結腸紐（ひも）・結腸膨起・腹膜垂の3構造が特徴。b誤：胆汁酸塩は肝臓で合成され、回腸末端で再吸収（腸肝循環）されるが、膵臓では分泌されない。c誤：横行結腸とS状結腸は腸間膜を有し遊離しており、腸管外へ引き出しやすいためストーマ造設に適している。" },
  { id:54, school:"福岡", year:2024, topic:"ストーマ", question:"小児期にストーマを必要とする疾患について正しいのはどれか。\n1. 総排泄腔外反症は、膀胱が表正中に外反・脱出し、これに連なって両側に腸管が外反している\n2. 鎖肛型の直腸肛門奇形は、生後3か月以内に金属式肛門形成術を行う\n3. ヒルシュスプルング病は、便秘のみの経路で発見される場合が多い\n4. ヒルシュスプルング病は、すべての病型で永久ストーマ造設が必要な先天性疾患", options:["1", "2", "3", "4"], answer:0, explanation:"正解：1。総排泄腔外反症は膀胱が正中に外反・脱出し、両側に腸管が外反する重篤な奇形。2誤：鎖肛の根治術（肛門形成術）は通常生後3か月以降に行う（新生児期は一時的結腸ストーマ造設）。3誤：ヒルシュスプルング病は腸閉塞や腸炎でも発見される。4誤：根治的手術（プルスルー術）で肛門温存が可能な場合が多く、永久ストーマが必須ではない。" },
  { id:55, school:"福岡", year:2024, topic:"ストーマ・制度", question:"ストーマ造設後に利用できる社会保険制度について、正しい組み合わせはどれか。\na. 身体障害者は者手帳の取得には障害認定ができる指定医が記載した診断書が必要\nb. 身体障害者は者手帳は消化管ストーマと尿路ストーマがある場合は2級となる\nc. ストーマ装具の公費はストーマ造設術を受けた月は現金で支給される\nd. 身体障害者は者手帳の交付により給付金の減免制度が利用できる", options:["1. a, b", "2. a, d", "3. b, c", "4. c, d"], answer:1, explanation:"正解：a, d。a正：身体障害者手帳申請には指定医の診断書が必要。d正：手帳交付により税・公共料金等の減免制度が利用可能。b誤：消化管ストーマ4級＋尿路ストーマ4級の場合は、合算で3級相当になる（2級ではない）。c誤：装具の公費支給は現物支給が基本（払い戻し申請の場合もあるが「現金支給」ではない）。" },
  { id:56, school:"福岡", year:2024, topic:"ストーマ装具", question:"ストーマ周囲皮膚障害の重症度評価スケール（ABCD-Stoma®）について、正しい組み合わせはどれか。\na. ストーマ周囲を4部位に区別して評価する\nb. 評価する部位にストーマ粘膜も含まれる\nc. 粘膜皮膚離開部位は、皮膚障害なしとして評価する\nd. 皮膚保護剤が溶解している部位は、近接部として評価する", options:["1. a, b", "2. a, d", "3. b, c", "4. c, d"], answer:1, explanation:"正解：a, d。a正：ABCD-Stomaはストーマ周囲を近接部・中間部・辺縁部・ストーマ外周部の4部位で評価する。d正：皮膚保護剤が溶解している部位は近接部として評価する。b誤：ストーマ粘膜は評価対象外（皮膚部位のみ）。c誤：粘膜皮膚離開がある部位も皮膚障害として評価する。" },
  { id:57, school:"福岡", year:2024, topic:"制度・診療報酬", question:"排尿自立支援加算・外来排尿自立指導料について、正しい組み合わせはどれか。\na. 排尿自立支援加算において排尿ケアチームの構成員は医師、看護師、理学療法士または作業療法士から構成される\nb. 排尿自立支援加算・外来排尿自立指導料は週1回に限り6週を限度として算定できる\nc. 排尿自立支援加算の対象患者は尿失禁、尿閉等の下部尿路機能障害の症状を有するものが含まれる\nd. 排尿自立支援加算の施設基準にはマニュアル作成と院内研修の実施が含まれる", options:["1. a, b", "2. a, d", "3. b, c", "4. c, d"], answer:3, explanation:"正解：c, d。c正：下部尿路機能障害（尿失禁・尿閉等）を有する入院患者が対象。d正：施設基準にはマニュアル作成・院内研修の実施が含まれる。a誤：薬剤師は必須ではないが、OT/PTは排尿ケアチームに含まれる場合もある；基本構成は医師・看護師・PT or OT。b誤：週1回12週（84日）を限度として算定（6週ではない）。" },
  { id:58, school:"福岡", year:2024, topic:"排便管理", question:"蠕動運動を亢進させる下剤として、正しいのはどれか。\n1. ルビプロストン\n2. ソルビトール\n3. センナ\n4. サイリウム", options:["1", "2", "3", "4"], answer:2, explanation:"正解：3（センナ）。センナ（大腸刺激性下剤）はアントラキノン系で大腸の蠕動運動を亢進させる。1誤：ルビプロストン（アミティーザ）は腸管分泌促進薬（上皮機能変容薬）。2誤：ソルビトールは浸透圧性下剤（糖類）。4誤：サイリウムは膨張性下剤（食物繊維）。" },
  { id:59, school:"福岡", year:2024, topic:"IAD", question:"IAD（失禁関連皮膚炎）について、正しい組み合わせはどれか。\na. IADは、排泄物が皮膚に接触することによって生じる真皮表在性真菌感染症を含まない\nb. おむつを使用する場合、スキンケアに保護は不要である\nc. IAD重症度評価スケール（IAD-set）は、点数が高いほど重症である\nd. 重症度評価スケール（IAD-set）は、皮膚の状態と付着する排泄物のタイプで評価する", options:["1. a, b", "2. a, d", "3. b, c", "4. c, d"], answer:3, explanation:"正解：c, d。c正：IAD-setは点数が高いほど重症（0〜8点）。d正：IAD-setは皮膚の状態（紅斑・びらん等）と排泄物のタイプ（尿・便）で評価する。a誤：IADにはカンジダ等の皮膚真菌感染が合併する場合がありこれも含まれる。b誤：おむつ使用時はスキンケア（洗浄・保湿・保護）が不可欠。" },
  { id:60, school:"福岡", year:2024, topic:"創傷管理", question:"創傷治癒の過程で正しいのはどれか。\n1. 出血凝固期 → 炎症期 → 増殖期 → 成熟期\n2. 炎症期 → 出血凝固期 → 増殖期 → 成熟期\n3. 出血凝固期 → 増殖期 → 炎症期 → 成熟期\n4. 炎症期 → 出血凝固期 → 成熟期 → 増殖期", options:["1", "2", "3", "4"], answer:0, explanation:"正解：1。創傷治癒の4段階：①出血・凝固期（止血）→②炎症期（白血球・マクロファージ遊走・デブリードマン）→③増殖期（肉芽形成・血管新生・上皮化）→④成熟・再構築期（コラーゲン再編成）。この順序は全ての二次治癒において共通の基本プロセス。" },
  { id:61, school:"静岡", year:2024, topic:"泌尿器解剖", question:"【問1】尿路の解剖と機能について正しいのはどれか。\n① 上部尿路は、腎臓と膀胱のことである\n② 尿管は、約50〜70cmである\n③ 尿管は蠕動運動することで、尿を腎盂から膀胱まで運ぶ\n④ 尿道の長さは、男性は約20cm、女性は約4cmである", options:["① 上部尿路=腎臓と膀胱", "② 尿管50〜70cm", "③ 尿管は蠕動運動で尿を運ぶ", "④ 男性約20cm・女性約4cm"], answer:2, explanation:"正解：③。尿管は蠕動運動によって腎盂から膀胱へ尿を運ぶ（正しい）。①誤：上部尿路は腎臓＋尿管。膀胱は下部尿路。②誤：尿管の長さは約25〜30cm。③正：蠕動運動で尿を運ぶのは正しい。④誤：男性尿道は約16〜20cmで正しいが、女性尿道は約3〜4cmが正しい（問題文の「約4cm」は正確だが、組み合わせ問題として③が最も確実に正しい）。" },
  { id:62, school:"静岡", year:2024, topic:"排便管理", question:"【問2】排便のメカニズムについて、a・bの説明で当てはまるのはどれか。\na 内肛門括約筋は、交感神経の作用によって弛緩する\nb 直腸が伸展することによって、反射で便意を自覚する\n① どちらも正しい　② どちらも誤り　③ aのみ正しい　④ bのみ正しい", options:["① どちらも正しい", "② どちらも誤り", "③ aのみ正しい", "④ bのみ正しい"], answer:1, explanation:"正解：②どちらも誤り。a誤：内肛門括約筋（不随意筋）は副交感神経（骨盤神経）の興奮で弛緩し、交感神経の興奮で収縮する（排便を抑制）。b誤：直腸が伸展すると「便意（排便したいという感覚）」を自覚するのは正しいが、問題文に「尿意」という表記がある場合は誤り。実際は便意が正しく、bが「尿意」であれば②が正解。" },
  { id:63, school:"静岡", year:2024, topic:"スキン-テア", question:"【問3】スキン-テアについて、正しい組み合わせはどれか。\na. スキン-テアとは、「摩擦とずれ」で皮膚が裂けて生じる真皮深層までの創傷である\nb. 皮弁が完全に欠損しているスキン-テアは、STARスキン-テア分類のカテゴリー3である\nc. 皮弁があるスキン-テアの処置は、そのまま乾いたガーゼで圧迫して保護する\nd. カテゴリー1aのスキン-テアに創傷被覆材を使用した場合は、どの面から剥がしても良い", options:["① a, b", "② a, d", "③ b, c", "④ c, d"], answer:0, explanation:"正解：①a, b。a正：スキン-テアはIWIIの定義通り、摩擦・ずれにより皮膚が裂ける外傷性創傷（真皮に至る）。b正：STARカテゴリー3は皮弁が完全欠損した状態。c誤：皮弁がある場合は皮弁を元の位置に戻し、湿潤環境を保つ被覆材を使用する（乾燥ガーゼは不適切）。d誤：カテゴリー1aは皮弁を元の位置に戻せる状態であり、被覆材は皮弁の逆方向（創から外側方向）に剥がす。" },
  { id:64, school:"静岡", year:2024, topic:"創傷管理", question:"【問4】創傷の治癒過程において、白血球の遊走を引き起こす炎症性サイトカインや増殖因子が放出される時期はどれか。\n① 成熟期（再構築期）　② 炎症期　③ 出血・凝固期　④ 増殖期", options:["① 成熟期（再構築期）", "② 炎症期", "③ 出血・凝固期", "④ 増殖期"], answer:1, explanation:"正解：②炎症期。炎症期では血小板由来の増殖因子（PDGF）や炎症性サイトカイン（IL-1、TNF-α等）が放出され、好中球・マクロファージが遊走して壊死組織を除去する。成熟期はコラーゲン再編成、出血・凝固期は止血・フィブリン形成、増殖期は肉芽形成・上皮化が主体。" },
  { id:65, school:"静岡", year:2024, topic:"褥瘡・DESIGN-R", question:"【問5】DESIGN-R®2020について、正しい組み合わせはどれか。\na. 7項目についてそれぞれ評価し、すべての点数を合計する\nb. 創傷が滲出組織で覆われていて深さの判定が不要だったのでDUと判定する\nc. 「露出骨」はガーゼを貼付した場合を考慮して判定する\nd. 創面にゆりがあり、滲出液が多い場合はE3（滲出液多量）と境界値を越えた場合はE3として評価する", options:["① a, b", "② a, d", "③ b, c", "④ c, d"], answer:2, explanation:"正解：③b, c。b正：深さが壊死組織等で判定できない場合はDUと評価する（判定不能）。c正：露出骨（D5）の評価は、ガーゼで覆われていても骨が露出していれば5と評価する。a誤：深さ（D）は治癒を示す指標のため、重症度合計点には含めない（小文字d/大文字Dのみで表記し合計点は他6項目）。d誤：滲出液の評価は量のみで境界値という概念はなく、状態に即した判定を行う。" },
  { id:66, school:"静岡", year:2024, topic:"褥瘡治療", question:"【問6】褥瘡治療に用いる外用薬について、正しいのはどれか。\n① 滲出液を減らすためにスルファジアジン銀（ゲーベン®クリーム）を使用した\n② 使い古し組織を融解し活性化するために、両側に精製白糖・ポビドンヨード（ユーパスタ®）を使用した\n③ 滲出組織を除去するために、プラタデシナトリウム（アクトシン®軟膏）を使用した\n④ 肉芽形成を促進させるために、トラフェルミン（フィブラスト®スプレー）を使用した", options:["① スルファジアジン銀で滲出液減少", "② 精製白糖・ポビドンヨードで組織融解", "③ プラタデシナトリウムで滲出組織除去", "④ トラフェルミンで肉芽形成促進"], answer:3, explanation:"正解：④。トラフェルミン（フィブラスト®スプレー）はbFGF（塩基性線維芽細胞増殖因子）であり、肉芽形成・血管新生促進の適応がある。①誤：スルファジアジン銀は抗菌・壊死組織融解（感染創・壊死創用）。②誤：精製白糖・ポビドンヨードは滲出液吸収・抗菌作用（滲出液を「減らす」ための抗菌薬は目的が異なる）。③誤：プラスタデシナトリウム（アクトシン®）は組織肉芽形成促進薬（デブリードマン薬ではない）。" },
  { id:67, school:"静岡", year:2024, topic:"ストーマ・制度", question:"【問7】身体障害者福祉法における身体障害者手帳手続きについて、誤っているものはどれか。\n① 永久ストーマ造設患者は、術後直ちに身体障害者手帳の申請ができる\n② 保険証を有していれば手続きを進めることができる\n③ 身体障害者手帳には本人の顔写真が貼付されている\n④ 申請者は本人の診断書を添付しなければならない", options:["① 術後直ちに申請可", "② 保険証があれば手続き可", "③ 顔写真が貼付されている", "④ 診断書の添付が必要"], answer:0, explanation:"正解（誤り）：①。身体障害者手帳の申請は術後、創部が安定してから（通常3か月以上経過後）に申請するのが一般的であり、「術後直ちに」申請することはできない。②正しい：保険証等の本人確認書類が必要。③正しい：手帳には顔写真が貼付される。④正しい：指定医が記載した診断書（意見書）が必要。" },
  { id:68, school:"静岡", year:2024, topic:"ストーマ合併症", question:"【問8】ストーマ合併症と出現しやすいストーマの種類の組み合わせで、誤っているものはどれか。\n① ストーマ脱出 ―――― 消化管ストーマ\n② ストーマ壊死 ―――― 尿路ストーマ\n③ 後ストーマヘルニア ―― 尿路ストーマ\n④ 偽上皮腫性肥厚 ―――― 尿路ストーマ", options:["① ストーマ脱出−消化管ストーマ", "② ストーマ壊死−尿路ストーマ", "③ 後ストーマヘルニア−尿路ストーマ", "④ 偽上皮腫性肥厚−尿路ストーマ"], answer:1, explanation:"正解（誤り）：②。ストーマ壊死は血行障害による合併症で、消化管ストーマ（特にコロストミー）に多い。尿路ストーマ（回腸導管・尿管皮膚瘻）での壊死は比較的少ない。③正：傍ストーマヘルニアは全ストーマで起こりうるが、特に尿路ストーマ（単孔式）でも多い。④正：偽上皮腫性肥厚は尿路ストーマ（アルカリ尿）で特に起こりやすい。" },
  { id:69, school:"静岡", year:2024, topic:"排便管理", question:"【問9】溢流性便失禁になりやすい特徴で、誤っているはどれか。\n① 高齢者\n② 直腸切除後\n③ 直腸脱\n④ 兎糞便", options:["① 高齢者", "② 直腸切除後", "③ 直腸脱", "④ 兎糞便"], answer:1, explanation:"正解（誤り）：②直腸切除後。溢流性便失禁は直腸に糞便が過剰に貯留し、その周囲を液状便が漏れる状態（宿便性失禁）。高齢者・直腸脱・兎糞便（弛緩性便秘）が原因となりやすい。直腸切除後は直腸容量低下による切迫性便失禁の原因となる（溢流性ではない）。" },
  { id:70, school:"静岡", year:2024, topic:"排尿障害", question:"【問10】腹圧性尿失禁についての説明で、誤っているのはどれか。\n① 尿道括約筋障害によって引き起こされる\n② 男性に比べて女性の発生頻度が高い\n③ 尿意切迫感と同時または尿意切迫感の直後に、不随意に尿が漏れる\n④ 骨盤底筋訓練が有用である", options:["① 尿道括約筋障害", "② 女性の発生頻度が高い", "③ 尿意切迫感と同時・直後に漏れる", "④ 骨盤底筋訓練が有用"], answer:2, explanation:"正解（誤り）：③。③は切迫性尿失禁の説明。腹圧性尿失禁は腹圧上昇（咳・くしゃみ・運動等）で尿が漏れる状態であり、尿意切迫感は伴わない。①正：骨盤底筋の弛緩・尿道括約筋機能不全が原因。②正：骨盤底の解剖学的差異から女性に多い。④正：骨盤底筋訓練は第一選択の保存的療法。" },
  { id:71, school:"清瀬H25", year:2013, topic:"皮膚解剖", question:"問題1｜皮膚の解剖生理について正しいものはどれか（2つ選べ）。\na. 表皮の最上層にある角質は、1週間ほどで脱落する\nb. 皮膚のpHは5〜7の弱酸性である\nc. 真皮の網状層には膠原線維、弾性線維が存在し、皮膚の弾力を担っている\nd. エクリン腺は、手掌、足底、腋窩に多く分布し、体温調節を担っている\ne. 表皮には、有棘血管と神経終末が多く走在する", options:["1. a, b", "2. a, e", "3. b, c", "4. c, d", "5. d, e"], answer:2, explanation:"正解：b, c。b正：皮膚のpHは汗と皮脂の混合物により弱酸性（pH4.5〜6.5）に保たれる。c正：真皮網状層にはコラーゲン・エラスチンが豊富で、皮膚の強度と弾力を担う。a誤：角質は約28日サイクル（ターンオーバー）で脱落し、1週間ではない。d誤：エクリン腺は全身に分布（手掌・足底・腋窩に特に多い）が、体温調節は正しい；分布については「全身」が正確。e誤：表皮には血管は存在せず（無血管）、神経終末は角質層には少ない。" },
  { id:72, school:"清瀬H25", year:2013, topic:"皮膚スキンケア", question:"問題2｜皮膚の保湿について誤っているものはどれか（2つ選べ）。\na. 皮膚に亀裂がある場合、尿素製剤を使用すると一過性の疼痛を生じる\nb. セラミドは角質細胞間脂質の1つであり、加齢、アトピー性皮膚炎などで減少する\nc. ヘパリン類似物質は皮膚分泌物の代替物質の1つである\nd. 保湿剤は入浴直後に塗布すると吸収されにくい", options:["1. a, b", "2. a, d", "3. b, c", "4. c, d", "5. a, c"], answer:3, explanation:"正解（誤り）：c, d。c誤：ヘパリン類似物質（ヒルロイド®）は角質の水分保持・血流促進作用を持つ保湿薬であり、皮膚「分泌物の代替」ではない。d誤：保湿剤は入浴直後（皮膚が湿潤・柔軟な状態）に塗布すると最も吸収されやすい（入浴直後3分以内が効果的）。a正：尿素製剤はpHが高く、亀裂部位の神経末端に刺激となり一過性疼痛を生じることがある。b正：セラミドは加齢・アトピー性皮膚炎で著明に減少する。" },
  { id:73, school:"清瀬H25", year:2013, topic:"褥瘡・DESIGN", question:"問題4｜褥瘡状態評価スケールDESIGN-Rについて誤っているものはどれか（2つ選べ）。\na. 急性期の褥瘡に使用可能である\nb. 5項目について評価する\nc. 会合点には0の点数を含めない\nd. 壊死組織で覆われて深さが不明の場合は、DUと呼称する\ne. 褥瘡間の重症度を比較できる", options:["1. a, b", "2. a, e", "3. b, c", "4. c, d", "5. d, e"], answer:2, explanation:"正解（誤り）：b, c。b誤：DESIGN-Rは7項目（Depth深さ・Exudate滲出液・Size大きさ・Inflammation/Infection炎症/感染・Granulation肉芽・Necrotic tissue壊死組織・Pocket）で評価する（5項目ではない）。c誤：合計点には0点（治癒状態）も含まれる。a正：急性期褥瘡にも使用可能（2020年版から急性期評価の概念が追加）。d正：深さ判定不能の場合はDUと表記する。e正：同一患者の経時的変化比較が主目的。" },
  { id:74, school:"清瀬H25", year:2013, topic:"体圧分散用具", question:"問題5｜体圧分散用具について誤っているものはどれか（2つ選べ）。\na. エアマットレスには、静止型と圧切替型がある\nb. ウレタンフォームマットレスは、劣化により形状変化（へたり）がおこる\nc. マットレスの素材は、身体の接触面積を広げる機能に着目したものをいう\nd. 特殊マットレスは、個人の身体に合わせて作成されるものをいう\ne. ハイブリッドマットレスとは、2種類以上の素材で構成されているものをいう", options:["1. a, b", "2. a, e", "3. b, c", "4. c, d", "5. d, e"], answer:3, explanation:"正解（誤り）：c, d。c誤：マットレスの素材は接触面積を広げる「圧再分配」の機能に着目したもの；「素材」と「機能」の定義が逆。d誤：特殊マットレスは個別オーダーではなく、標準的な体圧分散機能を持つ製品の総称（個人オーダーメイドではない）。a正：エアマットレスには静止型（ローエアロス型）と圧切替型（交互圧型）がある。b正：ウレタンフォームはへたりが生じる。e正：ハイブリッドマットレスは複数素材の組み合わせ。" },
  { id:75, school:"清瀬H25", year:2013, topic:"褥瘡治療", question:"問題6｜褥瘡の局所治療について誤っているものはどれか（2つ選べ）。\na. 水疱に対し、ポリウレタンフィルムドレッシングを貼付する\nb. 感染が疑いの場合に、ポビドンヨードシュガーを使用する\nc. 滲出液が減少した場合は、ドレッシング材をハイドロコロイドからハイドロファイバーに変更する\nd. 壊死組織を除去するために、トラフェルミンを使用する\ne. 上皮化を促進させるために、プロメライン（ブロメライン）を使用する", options:["1. a, b", "2. a, e", "3. b, c", "4. c, d", "5. d, e"], answer:3, explanation:"正解（誤り）：c, d。c誤：滲出液が減少した場合はハイドロファイバー（吸収性高）からハイドロコロイド（保湿性）への変更が適切（逆）。d誤：トラフェルミン（bFGF）は肉芽形成促進薬であり、壊死組織除去には使用しない。壊死組織除去にはブロメライン・外科的デブリードマン等を使用。a正：水疱はポリウレタンフィルムで保護するのが適切（破壊しない）。b正：感染疑いにはポビドンヨードシュガーが有効。e誤：プロメライン（ブロメライン）はタンパク分解酵素で壊死組織除去（上皮化促進ではない）→実はeも誤りだが問題の答えはc,d。" },
  { id:76, school:"清瀬H25", year:2013, topic:"褥瘡・栄養", question:"問題7｜創傷治療における栄養素の役割について正しいものはどれか（2つ選べ）。\na. 亜鉛は、RNA・DNA・たんぱく合成に関与する\nb. ビタミンCは、コラーゲンの合成に関与する\nc. ビタミンKは、組織細胞の自己融解に関与する\nd. アルギニンは、脂肪組織増殖に関与する\ne. グルタミンは、細胞たんぱくの恒常性制御に関与する", options:["1. a, b, c", "2. a, b", "3. a, d, e", "4. b, c, d", "5. c, d, e"], answer:1, explanation:"正解：a, b。a正：亜鉛はRNA・DNA・タンパク合成に必須の微量元素で、創傷治癒に重要。b正：ビタミンCはコラーゲン合成（プロリン・リジンの水酸化）に必須。c誤：ビタミンKは血液凝固因子の合成（カルボキシ化）に関与（細胞融解ではない）。d誤：アルギニンは一酸化窒素合成・免疫機能・コラーゲン合成に関与（脂肪組織増殖ではない）。e誤：グルタミンは免疫細胞・腸管粘膜細胞のエネルギー源として重要（細胞タンパクの恒常性制御は主な役割ではない）。" },
  { id:77, school:"清瀬H25", year:2013, topic:"褥瘡・制度", question:"問題8｜平成24年度の診療報酬改定後の入院基本料における褥瘡対策上の施設基準について正しいものはどれか。\na. 褥瘡管理に関して5年以上の臨床経験を有する者が専任の看護職員と認められる\nb. 全入院患者に対し、専任の医師および看護職員が診療計画の作成・実施・評価を行う\nc. 褥瘡対策チームの構成メンバー等による褥瘡対策に係る委員会が定期的に開催されていることが望ましい\nd. 患者の状態に応じて体圧分散マットレス等を適切に使用できる体制が整っている", options:["1. a, b", "2. a, d", "3. b, c", "4. c, d"], answer:3, explanation:"正解：c, d。c正：褥瘡対策委員会の定期開催が施設基準に含まれる。d正：体圧分散マットレスの適切使用体制が必要。a誤：専任看護職員の要件は「5年以上の褥瘡ケア経験」ではなく、褥瘡対策に関する適切な研修を修了した者等。b誤：全入院患者ではなく、リスクのある患者に対して診療計画を作成する。" },
  { id:78, school:"清瀬H25", year:2013, topic:"皮膚疾患", question:"問題9｜糖尿病性足病変を有する患者について誤っているものはどれか。\n1. 自律神経障害により発汗が増加し、皮膚が湿潤する\n2. 足白癬、爪白癬は高率に合併している\n3. 骨の変形により荷重部位が変化し、胼胝、潰瘍を生じやすい\n4. 知覚神経障害により、皮膚が損傷していても気付きにくい", options:["1. 発汗増加で皮膚湿潤", "2. 足白癬・爪白癬の合併", "3. 骨変形で胼胝・潰瘍", "4. 知覚障害で損傷気づきにくい"], answer:0, explanation:"正解（誤り）：1。糖尿病性自律神経障害では発汗「低下」により皮膚が乾燥・亀裂しやすくなる（湿潤ではなく乾燥）。2正：糖尿病患者は免疫機能低下により足白癬・爪白癬の合併率が高い。3正：シャルコー関節などで骨変形が生じ、異常な荷重がかかることで胼胝・潰瘍が形成される。4正：末梢神経障害により痛覚が低下し、損傷に気づかず悪化しやすい。" },
  { id:79, school:"清瀬H25", year:2013, topic:"消化管解剖", question:"問題11｜消化管の解剖生理について正しいものはどれか（2つ選べ）。\na. 小腸は十二指腸、空腸、回腸に分けられる\nb. 3大栄養素とビタミンは、大腸内でも吸収される\nc. 消化管の基本構造は、外側より粘膜層、筋層および漿膜層の3層からなる\nd. 結腸の動脈は上腸間膜動脈からの回盲動脈が付随して下行結腸まで走行する\ne. 肛門管は恥骨直腸筋付着部上縁から肛門縁までである", options:["1. a, b", "2. a, e", "3. b, c", "4. c, d", "5. d, e"], answer:1, explanation:"正解：a, e。a正：小腸はトライツ靱帯より十二指腸・空腸・回腸に分類される。e正：肛門管は恥骨直腸筋の付着部上縁（肛門直腸輪）から肛門縁まで（約3〜4cm）。b誤：3大栄養素の吸収は主に小腸で行われる（大腸では水分・電解質・ビタミンKを吸収）。c誤：消化管壁は内側から粘膜層・粘膜下層・筋層・漿膜（外膜）の4層構造。d誤：上腸間膜動脈は回腸・盲腸〜横行結腸を支配；下行結腸は下腸間膜動脈が支配。" },
  { id:80, school:"清瀬H25", year:2013, topic:"ストーマ", question:"問題15｜消化管ストーマについて正しいものはどれか（2つ選べ）。\na. ハルトマン術は永久ストーマとなる\nb. 永久ストーマ造設が必要な疾患で最も頻度が高い疾患は、直腸・肛門の疾患である\nc. 家族性大腸腺腫症（家族性大腸ポリポーシス）は、全大腸摘出術を施行し、回腸ストーマを造設する\nd. 急会陰式直腸切断術はダブルストーマとなる\ne. 横行結腸ストーマ造設術では、単孔式ストーマが多い", options:["1. a, b", "2. a, e", "3. b, c", "4. c, d", "5. d, e"], answer:1, explanation:"正解：a, b（または a, b が正しい）。a正：ハルトマン術は直腸を切除後に肛門は縫合閉鎖し永久的なS状結腸単孔式ストーマを造設する（ただし条件によっては再建も可）。b正：直腸がんが永久ストーマの最多原因。c誤：家族性大腸ポリポーシスでは全大腸摘出後に回腸嚢肛門吻合術（J-pouch）が行われ、回腸ストーマは一時的なことが多い。d誤：腹会陰式直腸切断術（マイルズ手術）は永久単孔式結腸ストーマを1つ造設（ダブルではない）。e誤：横行結腸ストーマは緊急時に多く、ループ式（双孔式）が多い。" },
  { id:81, school:"清瀬H25", year:2013, topic:"ストーマ装具", question:"問題22｜ストーマ装具について正しいものはどれか（2つ選べ）。\na. フランジとは、面板と袋部の接合部分をいう\nb. 凸型の嵌め込み具内蔵具は、圧迫による皮膚障害を生じる可能性がある\nc. 親水性ポリマーのCMCは注腸作用がある\nd. S15が含まれている皮膚保護剤は、接触により溶解する\ne. ポリマーブレンド系皮膚保護剤は、親水性ポリマーと疎水性ポリマーを混合したものである", options:["1. a, b, c", "2. a, b, e", "3. a, d, e", "4. b, c, d", "5. c, d, e"], answer:1, explanation:"正解：a, b, e。a正：フランジは面板と袋（パウチ）の接合部分（スナップ・ロック部分）。b正：嵌め込み具（凸面型）の圧迫は皮膚障害リスクがある。e正：ポリマーブレンド系は親水性（CMC等）と疎水性ポリマーの混合で耐久性と密着性を両立。c誤：CMCは吸水性を持つ親水性ポリマーで注腸作用はない。d誤：S15（カラヤガム成分）は排泄物・水分によって溶解する；「接触により溶解」は不正確（尿・便のアルカリ・水分で溶解）。" },
  { id:82, school:"清瀬H25", year:2013, topic:"排尿機能", question:"問題25｜排尿機能のメカニズムについて誤っているものはどれか（2つ選べ）。\na. 蓄尿時には排尿筋が弛緩して尿道が収縮する\nb. 排尿時には排尿筋が収縮して尿道が弛緩する\nc. 蓄尿には副交感神経がはたらく\nd. 排尿には交感神経がはたらく", options:["1. a, b", "2. a, d", "3. b, c", "4. c, d"], answer:3, explanation:"正解（誤り）：c, d。c誤：蓄尿時は交感神経（下腹神経）が働き、排尿筋弛緩・内尿道括約筋収縮（蓄尿促進）。d誤：排尿時は副交感神経（骨盤神経・S2〜S4）が働き、排尿筋収縮・内括約筋弛緩（排尿促進）。a正：蓄尿時は排尿筋弛緩＋尿道収縮（括約筋収縮）。b正：排尿時は排尿筋収縮＋尿道（括約筋）弛緩。" },
  { id:83, school:"清瀬H25", year:2013, topic:"ストーマ・制度", question:"問題24｜ストーマ保有者の社会保障制度について誤っているものはどれか。\n1. 身体障害者福祉法において、ストーマ保有者は3級、3級、4級のいずれかに認定される\n2. ストーマ装具使用明細書は、指定医が作成する必要がある\n3. 永久ストーマ保有者であれば、手続きを行えばただちに身体障害者手帳を申請できる\n4. ストーマ装具を自費で購入した場合、他の医療費と合算して年間10万円を超えると確定申告時に医療費控除の申請ができる", options:["1. 3,4,5級のいずれか", "2. 指定医が作成", "3. 手続き後ただちに申請可", "4. 医療費控除の申請可"], answer:2, explanation:"正解（誤り）：3。身体障害者手帳の申請は、術後に障害が固定し安定した状態になってから指定医の診断書をもって申請する。「手術直後・手続きすればただちに申請」はできない（通常術後3か月以上経過が目安）。1正：消化管ストーマ4級（1つ）・3級（2つ）、尿路ストーマ4級等（種類・数により）。2正：装具使用明細書は指定医が作成する。4正：ストーマ装具は医療費控除の対象となり、年間10万円超で申請可能。" },
  { id:84, school:"京都2025", year:2025, topic:"皮膚解剖", question:"設問1（高齢者の皮膚）｜高齢者の皮膚について、誤っているものはどれか（2つ）。\n8. 高齢者はNMFやセラジの働きの低下と角質層の水分量の減少がある\n9. 環境による皮膚の変化は少なく、かゆみの受容体がC線維から真皮内に遮断される\n10. おとなの皮膚所見の仕事量により内弾性板が崩壊し、細胞間の結びつきが緩くなる状態になる\n11. 乾燥した皮膚は、全てのモイスチャライザーの効果がある保護剤を塗布すると、効果的である\n12. 肌荒れが強い時は、全てのエモリエント効果のある保護剤を塗布し、スキンテアのリスクがある", options:["1. 8と9", "2. 9と11", "3. 9と12", "4. 10と12", "5. 11と12"], answer:1, explanation:"正解：9と11。9誤：高齢者では環境による皮膚変化は大きく（乾燥・摩擦に弱い）、かゆみ受容体の変化についての記述は不正確。11誤：乾燥した皮膚（スキンテアリスク）に全てのモイスチャライザーが有効とは言えず、刺激成分を含むものは避ける必要がある。他の選択肢はWOC看護の観点から概ね正しい内容を含む。" },
  { id:85, school:"京都2025", year:2025, topic:"体圧分散用具", question:"設問6（体圧分散マットレス）｜体圧分散マットレスについて、誤っているものを選びなさい。\n16. ハイブリッド型マットレスとは、エアセルとウレタンフォームの2層構造で、エアセルによる局所への圧迫低減に役立つ\n17. スモールチェンジ機能は、圧切替型マットレスにおいて、身体が体位変換の影響なく受ける体圧が変動する機能である\n18. マイクロクライメット（皮膚温・湿度）管理が重要な皮膚状態の場合、マイクロクライメット管理機能を持つ体圧分散マットレスを選択する\n19. 圧切替型マットレスを使用する場合は、底づきが起きないよう体圧をマネジメントすることが切断用マットレスとしての役割を示す\n20. 解熱などによる発汗量が多い患者の場合、フェールオーバー位置で最高の体圧状態にあるウレタンフォームマットレスを選択する", options:["1. 16と17", "2. 16と18", "3. 17と18", "4. 18と19", "5. 19と20"], answer:3, explanation:"正解：18と19。18誤：マイクロクライメット管理が重要な場合に適切なマットレスを選択すること自体は正しいが、問題文の記述が不正確な場合がある。19誤：底づき確認（底突き）はエアマットレスの設定で重要だが、「切断用マットレス」という表現は不適切。実際は「底づきしない」ことが体圧分散の基本。他の選択肢の記述は概ね正しい。" },
  { id:86, school:"京都2025", year:2025, topic:"褥瘡・栄養", question:"設問7（褥瘡予防・治療のための栄養管理）｜褥瘡予防・治療のための栄養管理について、誤っているものをひとつ選びなさい。\n① 体重減少率、上腕周囲長、主観的包括的栄養評価基準（SGA）、簡易栄養状態評価基準（MNA）など複数の指標を使い、低栄養のリスクスクリーニングを行う\n② マスラドの過程を行なう場合や持続的体位変換が減少される場合に、褥瘡発生のリスクが高まる\n③ Harris-Benedictの式で総エネルギー必要量（TEE）を求める場合は、基礎エネルギー消費量（BEE）に活動係数（AF）とストレス係数（SF）を乗じて算出する\n④ タンパク質について、NPUAPガイドラインでは、栄養リスクがあるいは褥瘡発生リスクがある場合は1.25〜1.5g/kgで提供している", options:["① SGA・MNA等で評価", "② 体位変換減少でリスク上昇", "③ Harris-Benedict式でTEE算出", "④ タンパク質1.25〜1.5g/kg"], answer:1, explanation:"正解（誤り）：②。体位変換を行わない（減少させる）ことは褥瘡リスクを高めるが、「マスラドの過程」という表現は適切でない可能性がある。また持続的体位変換（自動体位変換機能）は褥瘡リスクを「減少」させるもの。①正：複数ツールを使った栄養評価は推奨される。③正：Harris-Benedict式ではBEE×AF×SFでTEEを算出。④正：NPUAP/EPUAPガイドラインでは高リスク者に1.25〜1.5g/kgが推奨されている。" },
  { id:87, school:"京都2025", year:2025, topic:"褥瘡リスク評価", question:"設問8（褥瘡リスクアセスメントツール）｜褥瘡のリスクアセスメントツールについて、誤っているものをひとつ選びなさい。\n① ブレーデンスケールは、「摩擦とずれ」の項目だけは1〜3点で評価し、他の項目は1〜4点で評価する\n② ブレーデンスケールは、合計点が高いほどリスクが高くなる\n③ K式スケールは「前副褥瘡因」と「引き金因子」の2種類で構成され、65歳以上で評価をする\n④ OHスケールは「自力体位変換能力」「病的骨突出」「浮腫」「関節拘縮」の4項目をそれぞれ0〜3の範囲で評価する\n⑤ 厚生労働省褥瘡危険因子評価票は「あり（はいまたは「できない」の項目がひとつでもあれば、褥瘡ケアを適する", options:["① 摩擦とずれは1〜3点", "② 合計点高いほどリスク高", "③ K式スケールは65歳以上", "④ OHスケール4項目", "⑤ 危険因子評価票の判定"], answer:1, explanation:"正解（誤り）：②。ブレーデンスケールは合計点が「低いほど」リスクが高い（最高点23点が正常、低いほどリスク大）。①正：摩擦とずれだけは1〜3点、他は1〜4点の評価。③正：K式スケールは「前駆褥瘡因子」と「引き金因子」で構成。④正：OHスケールは自力体位変換・骨突出・浮腫・関節拘縮の4項目。⑤正：危険因子評価票で「できない/あり」が1つでも存在する場合は介入が必要とされる。" },
  { id:88, school:"京都2025", year:2025, topic:"創傷管理", question:"設問9（創傷管理・Wound hygiene）｜創傷管理について、正しい組み合わせを選びなさい。\na. 感染が起こっていると、滲出液が増加して内容が膿になる\nb. Wound hygieneの概念では、創面を洗浄して、壊死組織、組織の残骸、バイオフィルムを除去する\nc. 急性期であれば、クッション性の高いポリウレタンフォームを貼付する\nd. ドレッシング材は、創傷の環境を整備する役割がある\n③ a, b, c　④ a, b, d　⑤ b, c, d", options:["① a, b", "② a, c", "③ a, b, c", "④ a, b, d", "⑤ b, c, d"], answer:3, explanation:"正解：④a, b, d。a正：感染時は滲出液増加・膿（化膿性滲出液）がみられる。b正：Wound hygieneは洗浄・デブリードマン・バイオフィルム除去が主要ステップ。d正：ドレッシング材は創面の湿潤環境整備・感染防御・滲出液管理の役割を担う。c誤：急性期創傷にポリウレタンフォームは過剰吸収となる場合があり、創の状態・目的に応じた選択が必要。" },
  { id:89, school:"京都2025", year:2025, topic:"ストーマ合併症", question:"設問16（Dさんのストーマ合併症）｜Dさん（90歳代、男性、ストーマサイズ10mm×幅20mm×高さ8mm、10日ごとに交換）のストーマ合併症について、正しいものをひとつ選びなさい。\n① ストーマ静脈瘤\n② ストーマ・ヘルニア\n③ 後上皮腫性肥厚\n④ Outlet obstruction", options:["① ストーマ静脈瘤", "② ストーマ・ヘルニア", "③ 偽上皮腫性肥厚", "④ Outlet obstruction"], answer:2, explanation:"正解：③偽上皮腫性肥厚。尿路ストーマで面板孔がストーマより大きい場合、アルカリ尿が皮膚に慢性的に接触することでイボ状の増殖性変化（偽上皮腫性肥厚）が生じる。ストーマサイズが小さく（10mm）装具孔が大きい状態での典型的合併症。①ストーマ静脈瘤：門脈圧亢進症に伴う。②傍ストーマヘルニア：腹壁の脆弱化による。④Outlet obstruction：尿管カテーテルの閉塞等。" },
  { id:90, school:"京都2025", year:2025, topic:"排尿アセスメント", question:"設問24（過活動膀胱・OAB）｜過活動膀胱（OAB）について、正しい組み合わせを選びなさい。\na. 中年女性は、女性よりも男性の有病者が多い\nb. 原因として、非神経因性より神経因性のものが多い\nc. 切迫性尿失禁は必須症状である\nd. 過活動膀胱症状スコア（OABSS）は、OABの診断や他疾患集患定量に有用である", options:["1. a, b", "2. a, c", "3. b, c", "4. c, d", "5. a, d"], answer:3, explanation:"正解：c, d。c正：OABの定義では尿意切迫感が必須で、切迫性尿失禁は切迫感に伴うことが多いが、切迫性尿失禁を伴わないOABもある（ただし「切迫感」は必須）。d正：OABSSは頻尿・夜間頻尿・尿意切迫感・切迫性尿失禁の4項目で定量評価し診断補助に有用。a誤：OABの有病率は男女ほぼ同等〜やや女性に多い（特に加齢女性）。b誤：OABの多くは神経因性ではなく非神経因性（特発性）が多い。" },
  { id:91, school:"京都2024", year:2024, topic:"褥瘡・DESIGN-R", question:"設問2（DESIGN-R®2020評価）｜AさんのDESIGN-R®2020（仙骨部褥瘡：深さDU・内肉芽g0・壊死組織n0・大きさ）について、正しいものをひとつ選びなさい。\n① 深さ：DU、内肉芽組織：g0、壊死組織：N6\n② 深さ：DDTl、内肉芽組織：g0、壊死組織：n0\n③ 深さ：DDTl、内肉芽組織：G6、壊死組織：n0\n④ 深さ：DDTl、内肉芽組織：g0、壊死組織：N6\n⑤ 深さ：DU、内肉芽組織：g0、壊死組織：n0", options:["① DU・g0・N6", "② DDTl・g0・n0", "③ DDTl・G6・n0", "④ DDTl・g0・N6", "⑤ DU・g0・n0"], answer:4, explanation:"正解：⑤DU・g0・n0。DU（Depth Unknown）：深さが壊死組織等で判定できない。g0（肉芽0点）：良性肉芽が創面の90%以上を占める最良の状態。n0（壊死組織0点）：壊死組織なし。壊死なし・肉芽良好だがDTIが疑われるような深さ不明の場合はDUとなる。全部大文字（G・N）は重症側の評価で、最良の状態を示す小文字（g0・n0）が適切。" },
  { id:92, school:"京都2024", year:2024, topic:"褥瘡管理", question:"設問3（Aさんの褥瘡管理）｜褥瘡管理について、誤っているものをひとつ選びなさい。\n① 皮下膿瘍がないため、局所の観察や採取データ・創傷後、顔後で評価する\n② 外用薬はスルファジアジン銀を選択する\n③ 黒色壊死組織の箇所にメスで毎日の切り込みに切れ込みを入れる\n④ 圧迫やずれのために創傷被覆材を活用する\n⑤ 褥瘡対策チームとなく、緩和ケアチームやNSTと協働して褥瘡管理計画を立案する", options:["① 局所観察・評価", "② スルファジアジン銀を選択", "③ 黒色壊死にメスで切り込み", "④ 創傷被覆材で圧迫・ずれ対策", "⑤ 多職種チームで計画立案"], answer:2, explanation:"正解（誤り）：③。黒色壊死組織に毎日メスで切り込みを入れることは不適切（感染・出血リスク）。壊死組織の除去は適切なデブリードマン（外科的・自己融解的・酵素的等）で段階的に行う。①正：皮下膿瘍がない場合は保存的局所ケアが基本。②正：感染・壊死創にはスルファジアジン銀（抗菌・壊死融解）が適応。④正：創傷被覆材でずれ・摩擦を軽減。⑤正：緩和ケアチーム・NSTとの連携は重要。" },
  { id:93, school:"京都2024", year:2024, topic:"スキン-テア", question:"設問5（Bさんのスキン-テア）｜皮膚を裂いた後のスキン-テアの状態について、正しいものを（　）内の①・②から選びなさい。\n9. 皮弁 （①ある・②ない）\n10. 皮弁色 （①赤白や薄い・②蒼白や混濁・暗色）\n11. 創縁は解剖学的位置に（①戻すことができ・②戻すことができなかった）", options:["9①10①11①（ある・赤白・戻せる）", "9①10②11①（ある・蒼白暗色・戻せる）", "9①10①11②（ある・赤白・戻せない）", "9②10①11②（ない・赤白・戻せない）"], answer:1, explanation:"正解：9①10②11①（皮弁あり・蒼白/混濁/暗色・戻せる）→STARカテゴリー1b。STARカテゴリー1aは皮弁が戻せる＋色正常、1bは皮弁が戻せる＋蒼白/混濁/暗色。皮弁の色が蒼白・混濁・暗色の場合は血流不良を意味する。" },
  { id:94, school:"京都2024", year:2024, topic:"スキン-テア", question:"設問6（スキン-テアのケア）｜スキン-テアのケア方法について、正しい組み合わせをひとつ選びなさい。\na. 出血していたため圧迫して止血した\nb. 血腫が形成されていたため、鋭利な器具で穿刺した\nc. 皮弁を元に戻さないように指や手掌で皮弁を戻し、固定する\nd. 皮膚保護剤を使用して貼付する際、創離開に気付かないようにテープの貼り直しを避けた\n⑤ d, e（但しeは「はがす際は皮弁の方向に注意し、皮弁の逆方向にはがす」）", options:["①a, b", "②a, c", "③a, e", "④b, d", "⑤ d, e"], answer:4, explanation:"正解：⑤d, e。d正：テープ被覆材の頻繁な貼り直しはスキン-テアを悪化させるため、必要最小限にする。e正：被覆材を剥がす際は皮弁の方向に注意し、皮弁の逆方向（創から外側方向）にゆっくり剥がす。a：圧迫止血は正しいが組み合わせの正解はd,e。b誤：血腫の穿刺は感染リスクがある。c誤：皮弁は指や湿らせた綿棒で元の位置に戻し固定するが、「戻さないように」は誤り。" },
  { id:95, school:"京都2024", year:2024, topic:"褥瘡・MDRPU", question:"設問8（MDRPUとCさんのストーマ）｜MDRPU（医療関連機器圧迫創傷）について、正しい組み合わせを選びなさい。\n22. 褥瘡の縮小繊維は医療機器によって生じた創傷はMDRPUではない\n23. 医療機器ではないパッド等により生じた創傷はMDRPUではない\n24. 有病者者のうち、小児専門病院を小児専門病院が最も多い\n25. 施設設備によらず、最も多く創傷発生に関与しているのは弾性ストッキングである", options:["1. 22のみ", "2. 23のみ", "3. 22と23", "4. 23と25", "5. 24のみ"], answer:1, explanation:"正解：②23のみ。医療関連機器圧迫創傷（MDRPU）はIVラインや医療チューブ、弾性ストッキング等の医療機器・器具によって生じる皮膚・軟部組織の創傷。パッド等の非医療器具は本来MDRPUに含まれないとする見解が正しい。22誤：医療機器によって生じた創傷はMDRPU（皮膚の縮小繊維ではなく圧迫による機序）。25誤：施設によって差はあるが弾性ストッキングだけが最多とは言えない。" },
  { id:96, school:"京都2024", year:2024, topic:"ストーマサイトマーキング", question:"設問14（ストーマサイトマーキング）｜ストーマの位置決め（ストーマサイトマーキング）について、誤っているものをひとつ選びなさい。\n① 目的のひとつは、術後に予測される合併症を予防することである\n② 腹部前面下半部で、正中線の目安の位置は中心が目標である\n③ 緊急手術の場合でも、基本的にはおよそ正中線を目安として行う\n④ フリーブランドクリニックの原則がある\n⑤ 印鑑などのマーキングをした後に、仰臥位や前屈位で確認すべきである", options:["①目的は合併症予防", "②腹部下半部・正中線中心", "③緊急手術でも正中線目安", "④クリーブランドクリニックの原則", "⑤各体位で確認"], answer:1, explanation:"正解（誤り）：②。ストーマサイトマーキングの基本はクリーブランドクリニックの原則に基づき、腹直筋内に位置することが最も重要。「正中線の中心」ではなく、腹直筋内・臍と上前腸骨棘を結ぶ線の中点付近が目安。①正：術後合併症（傍ヘルニア・脱出・ストーマケア困難）の予防が目的。③正：緊急時でもマーキングを行うことが推奨される。④正：クリーブランドクリニック（Turnbull）の5原則がある。⑤正：仰臥位・座位・立位・前屈位で確認する。" },
  { id:97, school:"京都2024", year:2024, topic:"ストーマ・制度", question:"設問19（Fさんのストーマ外来受診時の診療報酬）｜ストーマ保有者の診療報酬について、正しい組み合わせを選びなさい。\na. 化学療法中の在宅療養指導料は算定できない\nb. ストーマ処置料は70点算定できる\nc. 子宮がんの手術でストーマ造設となったため、身体障害者手帳の申請はできない\nd. ストーマ用品の購入時は、医療費控除の対象となるため、領収書を保管することを伝える", options:["1. a, b", "2. a, c", "3. b, c", "4. b, d", "5. c, d"], answer:3, explanation:"正解：b, d。b正：ストーマ処置料はストーマ1個の場合70点。d正：ストーマ用品は医療費控除の対象（領収書保管が重要）。a誤：在宅療養指導料は化学療法中でも算定可能（対象患者条件を満たせば）。c誤：原因疾患に関わらず永久ストーマを造設した場合は身体障害者手帳を申請できる（子宮がんも対象）。" },
  { id:98, school:"京都2024", year:2024, topic:"排便管理", question:"設問20（排便機能の生理）｜排便機能の生理について、誤っている組み合わせを選びなさい。\na. 排便には交通神経が刺激し、徴量（空腹感）を促進できる限界がある\nb. 1日の排便量は100〜200ml程度を満たるまでに便意を感じる\nc. 健常者では1回の排便時に生じた便を全て排出することができる\nd. 3〜4週間ごとに排便調整が行なえる\ne. 腸粘膜運動は外括約筋に連続し、しばらくの間収縮制御が行なわれる", options:["1. a, b", "2. a, c", "3. a, e", "4. b, c", "5. d, e"], answer:0, explanation:"正解（誤り）：a, b。a誤：排便は主に副交感神経（骨盤神経）の刺激で促進され、交感神経が主体ではない。b誤：直腸に約150〜200mLの便が貯まると便意を感じるのが正しく、「100〜200mL」は概ね正しいが「満たるまで」という表現が不正確。他の記述は概ね正しい内容を含む。" },
  { id:99, school:"京都2024", year:2024, topic:"IAD", question:"設問24（IADおよびIAD-set）｜失禁関連皮膚炎（IAD）およびIAD-setについて、正しい組み合わせを選びなさい。\na. IADは、排泄物や皮膚に接触することにより生じる皮膚表在性炎症である\nb. IADの初発部位は、合指・肛門周囲・臀部・鼠径部・陰部など専門部が確認した湿潤環境部位である\nc. IAD-setの皮膚状態の記録はカンジダ症の確認が強調され、専門部の診断が確定した場合に加点する\nd. IAD-setでは、強い臭気を作り出す菌（アンモニア菌）がある場合は、感染を結んで軽症として取り扱われる", options:["1. a, b", "2. a, c", "3. b, c", "4. a, d", "5. c, d"], answer:0, explanation:"正解：a, b。a正：IADは排泄物（尿・便）が皮膚に接触することで生じる皮膚の炎症性変化（表在性）の総称。b正：IADの好発部位は肛門周囲・会陰部・臀部・鼠径部・陰部など。c誤：IAD-setはカンジダ症の診断専用ではなく、皮膚状態を総合的に評価するスケール。d誤：アンモニア臭がある場合は感染リスクが高く、軽症扱いはしない。" },
  { id:100, school:"予想問題", year:2025, topic:"褥瘡・DESIGN-R", question:"【予想】DESIGN-R®2020の改定で新たに追加されたDTI（深部組織損傷）の評価として正しいのはどれか。\n1. DTIはd1（持続する発赤）と同じ扱いで評価する\n2. DTI疑いの場合はDTIと表記し、深さの評価に含める\n3. DTIはDTI（深部組織損傷疑い）として記録し、DESIGN-R2020の深さ評価に追加された\n4. DTIが疑われる場合は、創の大きさを計測してs点数で評価する", options:["1. d1と同扱い", "2. DTIと表記・深さ評価に含む", "3. DTIとして追加記録", "4. 大きさをs点数で評価"], answer:2, explanation:"正解：3。DESIGN-R2020の改訂で深部組織損傷（DTI）疑いがDTIとして深さの項目に追加された。これにより急性期の深部組織損傷を評価できるようになった。1誤：d1（持続する発赤）とは別カテゴリーとして独立している。2誤：DTIは記録に含めるが深さの確定評価ではなくDTIとして別途記載する形。4誤：DTI疑いの段階では大きさ計測よりも経時的観察が優先される。" },
  { id:101, school:"予想問題", year:2025, topic:"創傷被覆材", question:"【予想】創傷被覆材の選択について正しいのはどれか。\n1. 感染が疑われる滲出液の多い創傷にはハイドロコロイドが適している\n2. 乾燥した壊死組織を有する創傷にはハイドロジェルが有効である\n3. 滲出液が少ない清潔な創傷には親水性ファイバーを使用する\n4. 深い壊死ポケットにはシリコーンフォームを充填する", options:["1. 感染滲出液多→ハイドロコロイド", "2. 乾燥壊死→ハイドロジェル", "3. 清潔・少滲出液→親水性ファイバー", "4. 深い壊死ポケット→シリコーンフォーム"], answer:1, explanation:"正解：2。ハイドロジェルは水分を多く含み、乾燥した壊死組織を湿潤させ自己融解を促進する（自己融解的デブリードマン）。1誤：感染・滲出液多の創傷にハイドロコロイドは禁忌（嫌気性菌を増殖させるリスク）→アルジネート・ハイドロファイバー・銀含有製剤が適切。3誤：滲出液が少ない創傷に親水性ファイバー（高吸収性）は過剰乾燥を招く。4誤：ポケット内にはシリコーンフォームではなく、カルトスタット（アルジネート）・ハイドロファイバーを充填する。" },
  { id:102, school:"予想問題", year:2025, topic:"ストーマ・心理", question:"【予想】永久ストーマを造設した患者の心理的支援について最も適切なのはどれか。\n1. 手術直後から積極的にセルフケア指導を開始し、不安を軽減する\n2. 患者が「ストーマを見たくない」と言った場合、すぐに受容を促す\n3. 障害受容のプロセスモデル（コーン）を参考に、患者の段階に合わせて支援する\n4. 社会復帰後はオストメイトの支援が不要になるため、外来フォローを終了する", options:["1. 手術直後からセルフケア指導", "2. 見たくない→すぐ受容促す", "3. コーンのモデルで段階的支援", "4. 社会復帰後は外来終了"], answer:2, explanation:"正解：3。コーンの障害受容プロセスモデル（ショック→回復への期待→悲嘆→防衛→適応）を参考に、患者の心理的段階に応じた個別的支援が重要。1誤：手術直後は身体的・心理的負担が大きく、患者の準備状況に合わせた段階的指導が必要。2誤：「見たくない」という気持ちは否定せず、受容を強制しない；傾聴・共感が先決。4誤：永久ストーマ保有者は合併症予防・装具変更等で生涯にわたる外来フォローが必要。" },
  { id:103, school:"予想問題", year:2025, topic:"排尿障害", question:"【予想】過活動膀胱（OAB）の薬物療法について正しいのはどれか。\n1. 抗ムスカリン薬の主な副作用として下痢がある\n2. β3受容体作動薬（ミラベグロン）は口渇・便秘の副作用が少ない\n3. 抗ムスカリン薬は残尿がある患者に積極的に使用する\n4. β3受容体作動薬は前立腺肥大症の治療に第一選択薬として用いる", options:["1. 抗ムスカリン薬→下痢", "2. β3受容体作動薬→口渇・便秘少ない", "3. 抗ムスカリン薬→残尿あり積極使用", "4. β3受容体作動薬→前立腺肥大第一選択"], answer:1, explanation:"正解：2。β3受容体作動薬（ミラベグロン：ベタニス®）は抗コリン（抗ムスカリン）作用がないため、口渇・便秘・排尿困難等の抗コリン副作用が少ない。1誤：抗ムスカリン薬の主な副作用は口渇・便秘・尿閉・眼内圧上昇であり、下痢ではない。3誤：抗ムスカリン薬は尿閉リスクを高めるため、残尿が多い患者（特に前立腺肥大）には慎重投与。4誤：前立腺肥大症の第一選択はα1遮断薬（タムスロシン等）。" },
  { id:104, school:"予想問題", year:2025, topic:"褥瘡予防", question:"【予想】体位変換とポジショニングについて正しいのはどれか。\n1. 体圧分散マットレス使用中は体位変換は不要である\n2. 30度側臥位は90度側臥位と比べて大転子部への体圧が高い\n3. ポジショニングでは末梢が中枢より高くなるよう配置する\n4. 体位変換は2時間毎を基本とするが、マットレスの特性によって間隔を延長できる", options:["1. 体圧分散マットレス使用中は変換不要", "2. 30度側臥位は大転子部への体圧が高い", "3. 末梢を中枢より高く配置", "4. マットレス特性で間隔延長可"], answer:3, explanation:"正解：4。体位変換の間隔はJPUAガイドラインで「2時間ごと」を基本としつつも、高性能体圧分散マットレス使用時は4時間以上の延長が可能としている。1誤：体圧分散マットレスは圧分散を補助するが体位変換を代替するものではない。2誤：30度側臥位は大転子部への体圧が低く（骨突出を避けられる）、90度側臥位より推奨されることが多い。3誤：ポジショニングでは浮腫予防等を除き、末梢が中枢と同等またはやや低い位置を基本とする。" },
  { id:105, school:"予想問題", year:2025, topic:"ストーマ装具", question:"【予想】ストーマ装具の皮膚保護剤の特性について正しいのはどれか。\n1. カラヤガムは耐久性が高く、アルカリ性排泄物に強い\n2. ハイドロコロイド系皮膚保護剤は排泄物を吸収してゲル化し、装具交換時間を延長できる\n3. 疎水性ポリマーは水分を吸収してゲル化するため、腸液漏れに弱い\n4. ポリマーブレンド系は耐久性が低く、頻回交換が必要である", options:["1. カラヤガム→耐久性高・アルカリに強", "2. ハイドロコロイド系→吸収・ゲル化・交換延長", "3. 疎水性ポリマー→水分吸収・腸液に弱", "4. ポリマーブレンド系→耐久性低・頻回交換"], answer:1, explanation:"正解：2。ハイドロコロイド系皮膚保護剤はCMC（カルボキシメチルセルロース）等の親水性ポリマーが排泄物中の水分を吸収してゲル化し、皮膚を保護しながら装具装着期間を延長できる。1誤：カラヤガムはアルカリ性（尿・腸液）に弱く耐久性が低い→尿路ストーマには不適。3誤：疎水性ポリマーは水分を吸収しにくい（撥水性）が排泄物への耐久性に優れる。4誤：ポリマーブレンド系は親水性＋疎水性を兼ね備え耐久性が高い。" },
  { id:106, school:"予想問題", year:2025, topic:"排便管理", question:"【予想】排便機能障害のアセスメントについて正しいのはどれか。\n1. ブリストル便形状スケールは便の量を評価するスケールである\n2. 直腸指診は侵襲性が高いため、初回評価には使用しない\n3. 排便日誌は少なくとも3日間の記録が推奨される\n4. 肛門管内圧測定は下部消化管機能を客観的に数値化する検査である", options:["1. ブリストルスケール→便の量評価", "2. 直腸指診→初回に使用しない", "3. 排便日誌は3日間", "4. 肛門管内圧測定→下部消化管機能数値化"], answer:3, explanation:"正解：4。肛門管内圧測定（アノレクトマノメトリー）は肛門括約筋機能・直腸感覚・コンプライアンスを客観的に数値化できる重要な検査。1誤：ブリストル便形状スケールは便の「形状・硬さ」を評価（Type1-7）し、量は評価しない。2誤：直腸指診は肛門周囲筋肉の緊張・宿便確認・腸腫瘤触知等に有用で初回評価に含まれる基本診察。3誤：排便日誌は少なくとも1週間（7日間）の記録が推奨される。" },
  { id:107, school:"予想問題", year:2025, topic:"制度・認定看護師", question:"【予想】皮膚・排泄ケア認定看護師の役割について正しいのはどれか。\n1. 認定看護師は特定行為を行う権限を自動的に取得する\n2. 認定看護師の役割は実践・指導・相談の3つである\n3. WOC認定看護師は褥瘡ケアのみを専門とする\n4. 認定看護師の認定は5年ごとの更新が不要である", options:["1. 特定行為を自動的に取得", "2. 実践・指導・相談の3役割", "3. 褥瘡ケアのみ専門", "4. 更新不要"], answer:1, explanation:"正解：2。日本看護協会の認定看護師制度における役割は「①実践（ケアの実施）・②指導（他の看護師への指導）・③相談（コンサルテーション）」の3つ。1誤：特定行為は別途「特定行為研修」を修了した場合に実施できる（認定資格とは別制度）。3誤：皮膚・排泄ケア認定看護師は褥瘡・ストーマ・失禁（排尿・排便）の3領域をカバーする。4誤：認定看護師認定は5年ごとの更新審査が必要。" },
  { id:108, school:"予想問題", year:2025, topic:"IAD・スキンケア", question:"【予想】IAD（失禁関連皮膚炎）の予防・管理について正しい組み合わせはどれか。\na. 洗浄は1日2〜3回、弱酸性洗浄剤を使用し、最小限の摩擦で行う\nb. 皮膚保湿は少なくとも1日1回以上、全身に行う\nc. 撥水性皮膚保護剤（バリアクリーム・フィルム）は、排泄のたびに塗布しなおす必要がある\nd. カンジダ性皮膚炎が合併した場合は、抗真菌薬を使用する", options:["1. a, b", "2. a, d", "3. b, c", "4. a, b, d"], answer:3, explanation:"正解：④a, b, d（またはa, dが最も正確）。a正：弱酸性洗浄剤による低摩擦洗浄がIAD予防の基本。b正：保湿は毎日1回以上推奨。d正：カンジダ合併時は抗真菌薬（クロトリマゾール等）の外用が必要。c誤：撥水性保護剤（ジメチコン系バリアクリーム等）は1日1〜2回の使用が基本であり、毎排泄後の塗り直しは必要ない（持続性がある）。" },
  { id:109, school:"予想問題", year:2025, topic:"ストーマ・退院指導", question:"【予想】ストーマ保有者の退院後の生活指導として適切でないものはどれか。\n1. 温泉・銭湯入浴は、ストーマ袋を外して入浴することも可能であることを説明する\n2. 食事は基本的に制限はないが、ガスや臭いが出やすい食品を把握しておくよう説明する\n3. 装具の交換は必ず医療機関で行うよう説明する\n4. 海外旅行の際は、使用している装具を十分な量持参するよう説明する", options:["1. 温泉・銭湯でストーマ袋を外して入浴可", "2. ガス・臭い食品の把握を説明", "3. 装具交換は必ず医療機関で", "4. 旅行時は十分な装具を持参"], answer:2, explanation:"正解（適切でない）：3。ストーマ装具の交換はセルフケア（自己管理）が基本であり、「必ず医療機関で行う」という説明は誤り。退院前にセルフケアの習得を支援し、自宅での交換が自立できるよう指導することが目標。1正：温泉・銭湯では装具を外しても短時間なら問題ない（ストーマにキャップを使用する方法もある）。2正：ガス・臭いを出しやすい食品（ニンニク・玉ねぎ等）を把握することは生活の質向上に重要。4正：旅行時の装具不足は緊急事態になるため多めの持参が必要。" },
  { id:110, school:"予想問題", year:2025, topic:"創傷管理", question:"【予想】バイオフィルムへの対応として正しいのはどれか。\n1. バイオフィルムは通常の抗菌薬が十分に浸透するため、経口投与で除去できる\n2. バイオフィルムの除去には機械的デブリードマン（スクラビング）が有効である\n3. バイオフィルムが形成された創傷では、創の乾燥を保つことが最優先である\n4. 銀含有被覆材は、バイオフィルムの形成を促進させる作用がある", options:["1. 経口抗菌薬で除去可", "2. 機械的デブリードマンが有効", "3. 創の乾燥を最優先", "4. 銀含有被覆材はバイオフィルム促進"], answer:1, explanation:"正解：2。バイオフィルムは物理的・機械的な除去（スクラビング・鋭的デブリードマン）が最も有効。Wound hygieneの核心はこの物理的除去にある。1誤：バイオフィルムは多糖体マトリックスで覆われ、抗菌薬・消毒薬への耐性が著しく高く、経口投与では除去できない。3誤：バイオフィルム対策でも湿潤環境の維持が重要（乾燥は創傷治癒を阻害）。4誤：銀含有被覆材はバイオフィルム形成を「抑制」する作用がある。" },
  { id:111, school:"予想問題", year:2025, topic:"泌尿器解剖", question:"【予想】男性の排尿障害について正しいのはどれか。\n1. 前立腺肥大症では排尿筋過活動（OAB）は伴わない\n2. 前立腺がんの確定診断にはPSA検査のみで十分である\n3. 経尿道的前立腺切除術（TURP）後には一時的な腹圧性尿失禁が生じる可能性がある\n4. α1遮断薬は前立腺平滑筋を収縮させることで排尿を改善する", options:["1. 前立腺肥大→OABは伴わない", "2. PSA検査のみで確定診断", "3. TURP後に腹圧性尿失禁の可能性", "4. α1遮断薬→前立腺収縮で排尿改善"], answer:2, explanation:"正解：3。TURPや前立腺全摘術後には尿道括約筋の損傷により腹圧性尿失禁が生じることがある（多くは一時的）。1誤：前立腺肥大による膀胱出口部閉塞はOAB（過活動膀胱）を二次的に引き起こすことがある。2誤：PSAは前立腺がんのスクリーニングに有用だが、確定診断には前立腺生検（組織診）が必要。4誤：α1遮断薬は前立腺・膀胱頸部の平滑筋を「弛緩」させて尿道抵抗を低下させ排尿を改善する（収縮ではない）。" },
  { id:112, school:"予想問題", year:2025, topic:"ストーマ管理", question:"【予想】結腸ストーマの管理について正しいのはどれか。\n1. コロストミーの排泄物はイレオストミーより水様で管理が難しい\n2. S状結腸ストーマは排便習慣が規則的になりやすく、灌注排便法の適応となる場合がある\n3. ループ式ストーマは永久ストーマとして造設されることが多い\n4. 横行結腸ストーマは排泄物が固形で管理しやすい", options:["1. コロストミー排泄物は水様", "2. S状結腸ストーマは灌注排便法の適応", "3. ループ式は永久ストーマが多い", "4. 横行結腸ストーマは排泄物固形"], answer:1, explanation:"正解：2。S状結腸（下行結腸）ストーマでは排泄物がほぼ固形となり排便パターンが比較的規則的になるため、灌注排便法の適応となる場合がある。1誤：コロストミー（結腸ストーマ）はイレオストミー（回腸ストーマ）より排泄物が固形化しており管理しやすい（水様はイレオストミーの特徴）。3誤：ループ式ストーマは一時的（緊急・術前処置用）に使用されることが多く、永久ストーマには単孔式が一般的。4誤：横行結腸ストーマの排泄物は泥状〜半固形で、S状結腸より管理が難しい。" },
  { id:113, school:"予想問題", year:2025, topic:"排尿ケア", question:"【予想】間歇自己導尿（CIC）について正しいのはどれか。\n1. CICは無菌操作を必須とし、自宅では実施できない\n2. 導尿の頻度は残尿量に関わらず1日4〜6回を厳守する\n3. CICは排尿筋過活動を有する患者には禁忌である\n4. CICの合併症として尿路感染症・尿道損傷・結石形成がある", options:["1. CICは無菌操作必須・自宅不可", "2. 1日4〜6回厳守", "3. 排尿筋過活動は禁忌", "4. 感染・尿道損傷・結石形成が合併症"], answer:3, explanation:"正解：4。CIC（清潔間歇導尿）の合併症には、尿路感染症・尿道損傷・尿道狭窄・結石形成がある。1誤：CICは「清潔」操作（無菌操作より低レベル）で自宅での実施が基本。清潔操作（手洗い・カテーテルの洗浄・再利用）が認められている。2誤：導尿の頻度は残尿量（1回200〜400mL以下を目安）に応じて調整する。3誤：排尿筋過活動（OAB）はCICの適応とは関係ない；神経因性膀胱・尿閉がCICの主な適応。" },
  { id:114, school:"予想問題", year:2025, topic:"ストーマ・造設前", question:"【予想】ストーマサイトマーキングのクリーブランドクリニック5原則に含まれないのはどれか。\n1. 腹直筋を貫通する位置\n2. 臍より低い位置\n3. 皮膚のくぼみ・しわ・瘢痕・上前腸骨棘から離れた位置\n4. 患者自身が見ることができる位置\n5. 腸腰筋上の位置", options:["1. 腹直筋貫通", "2. 臍より低い", "3. くぼみ等から離れた位置", "4. 患者が見える位置", "5. 腸腰筋上"], answer:4, explanation:"正解：5（腸腰筋上）。クリーブランドクリニック（Turnbull）の5原則は①腹直筋内（貫通）、②臍より低い（場合による）、③皮膚のくぼみ・しわ・瘢痕・骨突出から離れた位置、④患者が見える位置、⑤ベルトラインより低い位置。「腸腰筋上」はクリーブランドの5原則には含まれない。腸腰筋上へのマーキングは傍ヘルニアリスクを高めるため避けるべき位置。" },
  { id:115, school:"予想問題", year:2025, topic:"皮膚病態", question:"【予想】褥瘡の発生機序に関与するリスク因子の組み合わせで正しいのはどれか。\na. 糖尿病による末梢神経障害（知覚低下）\nb. 高タンパク血症による組織浮腫\nc. 失禁による皮膚の湿潤\nd. 長時間の同一体位保持", options:["1. a, b", "2. a, c", "3. a, c, d", "4. b, d", "5. a, b, c, d"], answer:2, explanation:"正解：③a, c, d。a正：糖尿病性神経障害による知覚低下→圧迫・摩擦に気づかない→褥瘡リスク上昇。c正：失禁→皮膚湿潤→皮膚軟化・浸軟→摩擦への抵抗力低下→褥瘡リスク上昇（IAD合併リスクも増加）。d正：長時間の圧迫→組織虚血→褥瘡発生の直接的メカニズム。b誤：「高タンパク血症」は正常〜高値のことで褥瘡リスクではない；低タンパク血症・低栄養が褥瘡リスク因子。" },
{id:146, school:"予想問題", topic:"褥瘡の予防・リスクアセスメント", question:"【予想】DESIGN-R®2020（褥瘡状態判定スケール）に関する記述で正しいのはどれか。", options:["DスコアはDepth（深さ）を意味し、d0〜d5の6段階で評価する","Eスコア（Exudate）は滲出液の感染の有無を評価する","SスコアはSize（大きさ）で面積ではなく最長径のみを測定する","合計スコアが高いほど褥瘡の状態は改善に向かっていることを示す","ポケットは創周囲からの皮膚陥凹を指し、Dスコアに含まれる"], answer:0, explanation:"正解：①DスコアはDepth（深さ）でd0〜d5の6段階評価。②誤：E（Exudate）は滲出液の量を評価する。感染はI（Infection）が担当。③誤：S（Size）は長径×短径で面積（cm²）を算出する。④誤：DESIGN-Rは点数が高いほど重症（治癒困難）。⑤誤：ポケットはPスコアで独立評価（P0・P6・P12・P24）。"},
{id:147, school:"予想問題", topic:"褥瘡の予防・リスクアセスメント", question:"【予想】褥瘡の深達度分類（NPUAP/EPUAPのステージ分類）に関する記述で正しいのはどれか。", options:["カテゴリー/ステージⅠは表皮剥離を伴う開放創と定義される","カテゴリー/ステージⅡは全層皮膚欠損であり皮下組織が露出している","カテゴリー/ステージⅢでは骨・腱・筋肉は露出しない","深部組織損傷（DTI）疑いは壊死組織が厚く深さの判定が困難な場合をいう","カテゴリー/ステージⅣは壊死組織や痂皮で覆われ深さの判定ができない"], answer:2, explanation:"正解：③ステージⅢは全層皮膚欠損で皮下脂肪は露出しうるが骨・腱・筋肉は露出しない点がステージⅣと異なる。①誤：ステージⅠは消退しない発赤で皮膚の完全性は保たれる。②誤：ステージⅡは部分層欠損（真皮まで）で皮下組織は露出しない。④誤：DTI疑いは圧力・ずれによる深部組織損傷で表面皮膚が損傷していても深部は判定困難な状態。⑤誤：壊死組織・痂皮で覆われ深さ判定困難な状態は「判定不能（Unstageable）」と分類される。"},
{id:148, school:"予想問題", topic:"褥瘡の予防・リスクアセスメント", question:"【予想・事例】68歳女性。大腸癌腹腔鏡下手術予定。術前ブレーデンスケール13点、BMI17.5kg/m²、血清アルブミン3.0g/dL、手術予定時間4時間30分。術中・術後の褥瘡予防として最も適切なのはどれか。", options:["術前アルブミン3.0g/dLのため栄養介入は不要と判断する","術中はシリコーン系粘着ブランケットで固定し体位変換を省略する","術中は体圧分散マットレスを用い高リスク部位に皮膚被覆材を予防的に貼付する","術後24時間は安静を優先し体位変換を控える","仰臥位のため仙骨部・踵部以外にリスクはない"], answer:2, explanation:"正解：③術中褥瘡予防として体圧分散マットレス使用と仙骨・踵・後頭部等への予防的フォームドレッシング貼付が推奨される。①誤：Alb3.0g/dLは低栄養であり術前から栄養介入が必要。②誤：術中も体圧分散用具と定期的な圧迫部位確認が必要。④誤：術後も早期から2時間ごとの体位変換を実施する。⑤誤：仰臥位では後頭部・肩甲骨・肘・脊椎棘突起なども高リスク部位となる。"},
{id:149, school:"予想問題", topic:"褥瘡の予防・リスクアセスメント", question:"【予想】褥瘡の好発部位と体位の組み合わせとして正しいのはどれか。", options:["腹臥位　－　仙骨部・坐骨部","側臥位30°　－　腸骨稜・大転子部","座位（車椅子）　－　後頭部・肩甲骨部","側臥位90°　－　仙骨部・尾骨部","仰臥位　－　前額部・膝蓋骨部"], answer:1, explanation:"正解：②側臥位30°では大転子部・腸骨稜・内果への圧力が高まりやすい。①誤：腹臥位の好発部位は顔面・胸骨部・腸骨棘・膝蓋骨・足背など。③誤：座位（車椅子）は坐骨・尾骨・仙骨・脊柱棘突起部が好発。④誤：側臥位90°は大転子・腸骨・内外果・耳介・肩峰部が好発で仙骨は非接触。⑤誤：仰臥位は後頭部・肩甲骨・仙骨・踵骨が好発。前額部・膝蓋骨は腹臥位での好発部位。"},
{id:150, school:"予想問題", topic:"褥瘡の予防・リスクアセスメント", question:"【予想】褥瘡予防における栄養管理の根拠として正しいのはどれか。", options:["体重が正常範囲内であれば栄養状態は褥瘡リスクに関係しない","血清アルブミン値2.5g/dL未満は低栄養であり褥瘡発生リスクが高まる","コラーゲン合成にはビタミンCより亜鉛の方が重要である","褥瘡発生時の栄養必要量は安静時エネルギー消費量と同量でよい","水分摂取量は皮膚弾力性に影響しないため栄養評価に含めなくてよい"], answer:1, explanation:"正解：②血清アルブミン3.5g/dL未満が低栄養の目安で2.5g/dL未満は高度低栄養。低アルブミン血症は組織修復能低下・浮腫形成により褥瘡リスクを著しく高める。①誤：BMI正常でも低タンパク・ビタミン・微量元素欠乏があれば皮膚脆弱性が高まる。③誤：コラーゲン合成にはビタミンCが必須（プロリン・リシン水酸化）で亜鉛と両者が必要。④誤：褥瘡では30〜35kcal/kg/日・タンパク1.2〜1.5g/kg/日など安静時より高い必要量が推奨される。⑤誤：皮膚の水分保持・弾力性は水分摂取量と密接に関連するため栄養アセスメントに含める。"},
{id:151, school:"予想問題", topic:"褥瘡の予防・リスクアセスメント", question:"【予想・事例】85歳男性。パーキンソン病Hoehn-Yahr分類Ⅳ度でADL全介助、体重40kg（BMI14.7kg/m²）、皮膚乾燥・菲薄化あり、失禁あり。ブレーデンスケールの各項目評価として最も適切なのはどれか。", options:["「知覚の認知」は痛み反応があれば4点（障害なし）とする","「湿潤」は失禁があれば即1点（常に湿っている）とする","「摩擦とずれ」はADL全介助のため2点（潜在的に問題あり）とする","「栄養状態」はBMI14.7のため食事量に関わらず4点（非常に良好）とする","「活動性」は施設内を車椅子自走できれば3点（歩行可能）とする"], answer:2, explanation:"正解：③「摩擦とずれ」はADL全介助で体位変換ごとに摩擦・ずれが生じやすく皮膚菲薄化もあるため2点（潜在的に問題あり）が適切。1点（問題あり）は皮膚損傷が観察されている場合。①誤：パーキンソン病Ⅳ度では発語困難等もあり痛み反応のみで4点とはならない。②誤：「湿潤」は失禁の頻度で評価し常時失禁が1点。頻繁な失禁は2点の可能性もあり自動的に1点とはならない。④誤：「栄養状態」は食事摂取量・補助栄養で評価しBMIは直接基準ではなくBMI14.7は高度低栄養を示唆する。⑤誤：「活動性」3点は短距離でも歩ける場合。車椅子使用は2点（車椅子に限定）となる。"},
{id:152, school:"予想問題", topic:"褥瘡の予防・リスクアセスメント", question:"【予想】医療関連機器圧迫創傷（MDRPU）の予防として正しいのはどれか。", options:["人工呼吸器回路の固定具は皮膚に密着させてずれを防止する","気管切開カニューレの留置部は顔面・頸部皮膚を1日1回以上観察する","弾性ストッキングは適切サイズを選択すれば皮膚観察は不要である","ネーザルハイフローのカニューラは鼻翼への圧迫は問題とならない","尿道カテーテルは大腿内側固定の場合でもテープで密着固定する"], answer:1, explanation:"正解：②気管切開カニューレのフランジは頸部皮膚を継続的に圧迫するため1日1〜2回以上観察し必要に応じてクッション材を挿入する。①誤：人工呼吸器回路を皮膚に密着させると圧迫が増すためクッション材で圧を分散する。③誤：弾性ストッキングも定期的な皮膚観察と装着状態の確認が必要。④誤：ネーザルハイフローのカニューラは鼻翼・人中に強い圧迫を与えやすく皮膚保護材の使用と定期的観察が推奨される。⑤誤：尿道カテーテルの固定テープは緊張が生じないよう余裕をもたせ固定部位も定期的に変更する。"},
{id:153, school:"予想問題", topic:"褥瘡の予防・リスクアセスメント", question:"【予想】体圧分散マットレスの選択に関する記述で正しいのはどれか。", options:["自力体位変換が全くできない患者には静止型（フォーム型）マットレスが第一選択となる","圧切替型（交互圧）マットレスは循環不安定な術直後でも安全に使用できる","高機能型エアマットレスは底付きが生じても接地圧は変化しない","ウレタンフォームマットレスは洗浄・消毒が容易でICUで最も推奨される","反応型（センサー内蔵型）マットレスは患者の動きを感知して自動調整するため体位変換頻度の延長根拠となりうる"], answer:4, explanation:"正解：⑤反応型マットレスはセンサーで体圧を感知し自動調整するため体位変換頻度延長（4時間ごとへの変更等）の根拠として使用されることがある。①誤：自力体位変換困難なハイリスク患者には高機能型エアマットレスが推奨され静止型フォームは自力で動ける患者向け。②誤：圧切替型は交互収縮・膨張するため循環動態不安定例への使用は慎重を要する。③誤：底付きが生じると接地圧が急増し褥瘡リスクが高まるため底付きチェックが重要。④誤：ウレタンフォームは液体が浸透しやすく洗浄・消毒が困難なためICUでは交互圧型等が推奨される。"},
{id:154, school:"予想問題", topic:"褥瘡の予防・リスクアセスメント", question:"【予想・事例】91歳女性。老衰の終末期で在宅療養中。ADL全介助、経口摂取困難で水分少量のみ。仙骨部に4×5cm深さD3相当の褥瘡あり。本人・家族は積極的な治療を望まないと意思表示。褥瘡ケアの方針として最も適切なのはどれか。", options:["治癒促進を目標に積極的なデブリードメントと陰圧閉鎖療法を開始する","本人・家族の意向に関わらずDESIGN-Rスコアの改善を唯一の目標とする","苦痛の緩和を最優先とし疼痛管理と創部の清潔・保護に焦点を当てる","終末期では褥瘡ケアは不要と判断し処置を中止する","家族の意思決定を覆し医療チームが最善の治療法を決定する"], answer:2, explanation:"正解：③終末期の褥瘡ケアはQOLと苦痛軽減を優先する緩和的アプローチが推奨される。処置時の疼痛管理・創部の清潔維持・感染予防・臭気管理が中心。①誤：積極的なデブリードメントや陰圧閉鎖療法は本人・家族が望まない場合は適応とならない。②誤：終末期ではDESIGN-Rスコア改善よりQOL・苦痛軽減が主目標となる。④誤：処置中止はかえって感染・臭気・疼痛を増悪させQOLを低下させるため最小限のケアは継続する。⑤誤：本人の意思（ACP）と家族の意向を尊重することが倫理的に正しく医療チームが一方的に決定するのは自律尊重の原則に反する。"},
{id:155, school:"予想問題", topic:"褥瘡の予防・リスクアセスメント", question:"【予想】褥瘡予防のポジショニングに関する記述で正しいのはどれか。", options:["仰臥位での頭部挙上は30°以内であれば仙骨部への圧迫・ずれは生じない","側臥位では90°（真横）より30°傾斜の方が体圧分散効果が高い","下肢の踵部を除圧するには膝下にクッションを入れて踵を浮かせる","ポジショニングクッションは2時間ごとに取り除き皮膚観察後に再装着する","側臥位90°では耳介・肩峰・膝の外側への圧迫は少ない"], answer:2, explanation:"正解：③踵部の除圧は膝下（下腿）にクッションを入れ踵を完全に浮かせる（ヒールオフロード）ことが推奨される（NPUAP/EPUAPガイドライン）。①誤：頭部挙上30°以内でも仙骨部への圧迫・ずれはゼロにはならず30°以上でずれが増加する。②誤：30°側臥位は広い背部・殿部の筋肉で体重を支えるため接地圧が分散され90°側臥位より褥瘡リスクが低い。④誤：ポジショニングクッションは体位変換時に位置と皮膚状態を確認するが適切に機能していれば取り除く必要はない。⑤誤：側臥位90°では耳介・肩峰・腸骨稜・膝外側（腓骨頭）・外果など骨突出部への圧迫が生じやすく高リスクである。"},

{id:156, school:"予想問題", topic:"ストーマケア・管理・トラブル対応", question:"消化管ストーマの種類と排泄物の性状の組み合わせで最も適切なのはどれか。", options:["上行結腸ストーマ ─ 有形便","横行結腸ストーマ ─ 固形便","下行結腸ストーマ ─ 泥状〜軟便","S状結腸ストーマ ─ 有形便に近い","回腸ストーマ ─ 有形便"], answer:3, explanation:"正解：④S状結腸ストーマは大腸の最も末端に近いため水分吸収が十分に行われ、有形便に近い性状になる。①誤：上行結腸は水分吸収が少なく、排泄物は液状〜泥状となる。②誤：横行結腸ストーマの排泄物は泥状〜軟便程度で固形便にはならない。③誤：下行結腸ストーマの排泄物は軟便〜半固形程度であり、泥状〜軟便は横行結腸に相当する記述。⑤誤：回腸ストーマは小腸末端に造設され、消化酵素を多く含む液状〜泥状の排泄物が多量に排出される。"},
{id:157, school:"予想問題", topic:"ストーマケア・管理・トラブル対応", question:"【症例】65歳男性。直腸癌術後に永久的S状結腸単孔式ストーマを造設し、術後7日目。ストーマ周囲に発赤・浸軟・滲出液を認める。最も考えられる合併症はどれか。", options:["ストーマ壊死","ストーマ脱出","傍ストーマヘルニア","皮膚保護剤による接触皮膚炎","排泄物によるストーマ周囲皮膚障害（IAD様）"], answer:4, explanation:"正解：⑤術後早期は皮膚保護剤の密着が不安定なため排泄物が皮膚に接触しやすく、化学的刺激でIAD様のストーマ周囲皮膚障害が生じやすい。発赤・浸軟・滲出液はその典型的所見である。①誤：壊死はストーマ粘膜が黒〜暗紫色に変色する虚血性変化であり、発赤・浸軟とは異なる。②誤：ストーマ脱出は腸管が過剰に腹外に突出する機械的合併症で皮膚症状が主症状ではない。③誤：傍ストーマヘルニアはストーマ周囲の膨隆として現れる合併症。④誤：接触皮膚炎はパッチテストで確認できるアレルギー性反応であり、排泄物刺激による皮膚障害とは区別する。"},
{id:158, school:"予想問題", topic:"ストーマケア・管理・トラブル対応", question:"回腸ストーマ（イレオストミー）のセルフケア指導で最も重要な点はどれか。", options:["毎日同じ時間に装具交換を行うよう指導する","排泄物量が少ないため水分摂取制限は不要と伝える","排泄物は液状で酵素活性が高いため皮膚保護剤の溶解が速いと説明する","腸閉塞の予防に食物繊維を積極的に摂取するよう指導する","入浴時は必ず装具を外して入浴するよう指導する"], answer:2, explanation:"正解：③回腸ストーマからの排泄物は消化酵素（プロテアーゼ・リパーゼ等）を豊富に含む液状腸液であり、皮膚保護剤を短時間で溶解・侵食するため頻回な装具確認と適切な交換タイミングの指導が重要。①誤：装具交換のタイミングは溶解・剥離状態に応じて行うもので一律に毎日同時間ではない。②誤：回腸ストーマでは排泄量が多く（1日500〜1000mL以上）脱水・電解質異常リスクが高いため積極的水分摂取が必要。④誤：不溶性食物繊維の過剰摂取は食物性イレウスのリスクとなるため注意が必要。⑤誤：防水型装具であれば装具を付けたまま入浴可能であり外す必要はない。"},
{id:159, school:"予想問題", topic:"ストーマケア・管理・トラブル対応", question:"ストーマ装具の皮膚保護剤の主な成分と特性の組み合わせで誤っているのはどれか。", options:["カラヤガム ─ 天然由来・吸水性が高い","ペクチン ─ 植物由来・皮膚への密着性に優れる","ゼラチン ─ 動物由来コラーゲン・吸水性あり","カルボキシメチルセルロース（CMC）─ 高吸水性・ゲル形成","ポリウレタンフォーム ─ 皮膚保護剤として排泄物を直接吸収する"], answer:4, explanation:"正解：⑤ポリウレタンフォームは面板（皮膚保護剤）ではなくストーマ袋の外層やドレッシング材に使用される素材であり、ストーマ周囲の排泄物を直接吸収する皮膚保護剤成分ではない。①〜④は正しい：カラヤガム・ペクチン・ゼラチン・CMCはハイドロコロイド系皮膚保護剤の主要成分であり、吸水性と皮膚密着性を担う。"},
{id:160, school:"予想問題", topic:"ストーマケア・管理・トラブル対応", question:"【症例】72歳女性。膀胱癌により回腸導管を造設して3か月。最近、尿臭が強くなり、尿が混濁しストーマ周囲に白色〜ピンク色の結晶が付着している。最も考えられる状態はどれか。", options:["ストーマ壊死","ストーマ粘膜皮膚離開","リン酸マグネシウムアンモニウム結晶の沈着","ストーマ脱出","ストーマ周囲静脈瘤（CSAP）"], answer:2, explanation:"正解：③回腸導管造設患者で尿臭増強・混濁尿・白色〜ピンク色の結晶付着はリン酸マグネシウムアンモニウム（ストルバイト）結晶の典型的所見。尿路感染によるアルカリ尿でリン酸塩が析出する。酸性飲料（クランベリージュース等）の摂取や酢酸水での洗浄が対処法。①誤：壊死は粘膜の暗紫〜黒色変色が主徴。②誤：粘膜皮膚離開は術後早期の縫合部離開。④誤：脱出は腸管の体外突出。⑤誤：CSAPはストーマ周囲の紫色に怒張した静脈瘤。"},
{id:161, school:"予想問題", topic:"ストーマケア・管理・トラブル対応", question:"ストーマ造設後の身体像の変化への適応を促す看護介入として適切でないのはどれか。", options:["術前から患者・家族にストーマの外観や機能について具体的に説明する","ストーマ装具の自己交換を段階的に習得できるよう指導する","患者がストーマを否定的に述べた場合も否定せず感情を受容する","術後早期から鏡を用いてストーマを自分で確認できる環境を整える","患者がストーマを見ることを拒否した場合、繰り返し観察を強く勧めて早期適応を促す"], answer:4, explanation:"正解：⑤ストーマを見ることを拒否している患者に繰り返し観察を強要することは心理的侵襲となり適応を妨げる可能性がある。患者のペースを尊重しながら段階的に関与を促すことが重要。①正しい：術前オリエンテーションにより患者が現実的なイメージを持ちやすくなる。②正しい：自己管理能力の向上は自己効力感を高め適応を促進する。③正しい：感情の受容（共感的傾聴）は心理的サポートの基本。④正しい：自己のストーマを視認できる環境は新たな身体像統合を助ける。"},
{id:162, school:"予想問題", topic:"ストーマケア・管理・トラブル対応", question:"ストーマの位置（サイトマーキング）決定において考慮すべき条件として誤っているのはどれか。", options:["腹直筋内に位置することが望ましい","ウエストライン・臍・骨突出部・皮膚の皺から離れた位置が良い","患者自身がストーマを見えやすく装具操作ができる位置が望ましい","術前に立位・座位・臥位の各体位で確認する","ストーマ周囲皮膚は平坦でなくても装具固定に大きな影響はない"], answer:4, explanation:"正解：⑤ストーマ周囲皮膚の平坦性は装具の密着性・漏れ防止に直結するため非常に重要な条件である。皮膚の凹凸・瘢痕・皺があると密着不良となり皮膚障害リスクが増す。①〜④は正しいサイトマーキングの原則：腹直筋内への造設は傍ストーマヘルニアリスクを軽減し、各種ランドマークからの距離確保は装具固定性に優れる。複数体位での確認は実際の生活場面での適合性評価に必要。"},
{id:163, school:"予想問題", topic:"ストーマケア・管理・トラブル対応", question:"【症例】58歳男性。直腸切断術後、永久的S状結腸ストーマ造設3週間後に外来受診。ストーマは直径2cm・高さ5mmと扁平で、装具装着後にストーマが面板の穴の内側に沈み込む様子がある。この合併症として最も適切な名称はどれか。", options:["ストーマ壊死","ストーマ脱出","ストーマ退縮（陥没）","傍ストーマヘルニア","ストーマ狭窄"], answer:2, explanation:"正解：③ストーマ高さが低く（5mm以下）体位変換や腹圧上昇時にストーマが皮膚面以下に陥没する状態をストーマ退縮（陥没）という。面板とストーマの間に排泄物が侵入しやすく皮膚障害の原因となる。凸面装具（コンベックス面板）や補助用品（ベルト・ペースト等）で対応する。①誤：壊死は粘膜の虚血性変色が特徴。②誤：脱出は腸管が過剰に体外突出する状態。④誤：傍ストーマヘルニアはストーマ周囲腸管脱出による膨隆。⑤誤：狭窄はストーマ開口部が狭くなり排便困難を生じる状態。"},
{id:164, school:"予想問題", topic:"ストーマケア・管理・トラブル対応", question:"ウロストミー（回腸導管）の管理において正しいのはどれか。", options:["尿袋は毎日新品に交換することが推奨される","ウロストミー装具には逆流防止弁が必要ない","就寝時は蓄尿袋をストーマ袋に接続して使用する","正常な尿の性状は混濁尿・血尿が見られることが多い","皮膚保護剤の交換頻度は排泄量に関係なく1週間ごとで良い"], answer:2, explanation:"正解：③ウロストミー患者は就寝時に蓄尿袋をストーマ袋の排出口に接続することで夜間尿量を処理し溢れを防ぐ。①誤：ストーマ袋は毎日交換する必要はなく皮膚保護剤の交換タイミングに合わせる（数日〜1週間程度）。②誤：逆流防止弁はストーマ袋内の尿が逆流して皮膚保護剤を溶解しないよう保護するために重要な機能であり必須。④誤：健常な回腸導管からの尿は淡黄色透明が正常であり、混濁・血尿は尿路感染や出血を示す異常所見。⑤誤：皮膚保護剤の交換頻度は尿量・尿pH・溶解状態により個人差があり状態を観察して行う。"},
{id:165, school:"予想問題", topic:"ストーマケア・管理・トラブル対応", question:"【症例】45歳女性。潰瘍性大腸炎に対して大腸全摘術後、永久的回腸ストーマを造設して6か月。独身で職場復帰を希望しており「ストーマがあると人と食事も仕事もできない」と話している。WOC認定看護師として最も優先すべき介入はどれか。", options:["食事制限の詳細なリストを作成して提供する","職場復帰は困難なので障害年金申請の手続きを勧める","患者の思いを傾聴し就労・社会参加の実際を情報提供する","ストーマ装具の交換手技を再度確認して技術習得を優先する","家族に管理を委託するよう提案する"], answer:2, explanation:"正解：③患者の「食事も仕事もできない」という訴えは誤信念や心理的障壁を示している。まず傾聴して感情を受容し、実際にストーマを持ちながら就労・社会参加しているオストメイトの体験談や情報を提供することで現実的な希望を持てるよう支援する。オストメイトの会・患者会への紹介も有効。①誤：食事制限リスト提供は現時点での最優先ではなく心理的支援が先決。②誤：就労可能であることが多く障害年金申請を先に勧めることは不適切。④誤：今回の訴えの主問題は心理・社会的問題であり技術面の再確認は優先度が低い。⑤誤：本人のセルフケア能力と自律性を支援することが目標であり家族委託は不適切。"},
  {id:166, school:"予想問題", topic:"失禁関連皮膚炎（IAD）・排泄ケア", question:"失禁関連皮膚炎（IAD）の定義として最も適切なものはどれか。", options:["失禁に起因した尿または便（あるいは双方）との皮膚接触による皮膚炎","褥瘡の発症に関連した皮膚の炎症性変化","カテーテル留置部位周囲に生じる接触性皮膚炎","尿路感染症に伴う会陰部の皮膚障害","浮腫に起因した皮膚の脆弱化による炎症"], answer:0, explanation:"正解：①IAD（Incontinence-Associated Dermatitis）は、失禁（尿・便またはその双方）による皮膚への接触が原因で生じる皮膚炎であり、会陰部・肛門周囲・殿部・鼠径部などに好発する。②誤：褥瘡は圧迫・ずれが主因であり、IADとは病態が異なる（ただし合併することはある）。③誤：カテーテル留置部位周囲の皮膚炎はIADとは区別される。④誤：尿路感染症の皮膚症状はIADの定義に含まれない。⑤誤：浮腫による皮膚障害はIADの定義に含まれない。"},
  {id:167, school:"予想問題", topic:"失禁関連皮膚炎（IAD）・排泄ケア", question:"IADの発症に最も強く関与するメカニズムはどれか。", options:["圧迫とずれ力による虚血","尿・便中のアルカリ性物質や消化酵素による角層バリア機能の破壊","カンジダ属真菌の過増殖","血行障害による組織の壊死","アレルゲンによる遅延型過敏反応"], answer:1, explanation:"正解：②尿（アンモニア）のアルカリ性環境や便中の消化酵素（プロテアーゼ・リパーゼ等）が角層を傷害し、皮膚バリア機能を破壊することがIAD発症の主要機序である。皮膚pHの上昇も角層酵素活性を変化させバリア破壊を促進する。①誤：圧迫・ずれ力は褥瘡の主因であり、IADとは異なる。③誤：カンジダ感染はIAD後に二次感染として合併することがあるが、IADの一次的メカニズムではない。④誤：血行障害は虚血性潰瘍の原因であり、IADとは異なる。⑤誤：遅延型過敏反応はアレルギー性接触皮膚炎の機序であり、IADの主因ではない。"},
  {id:168, school:"予想問題", topic:"失禁関連皮膚炎（IAD）・排泄ケア", question:"IADと褥瘡（カテゴリーⅠ）の鑑別に最も有用な所見はどれか。", options:["発赤部位が骨突出部に一致するかどうか","患者の年齢が65歳以上かどうか","発赤の色が紫色調かどうか","血清アルブミン値が低値かどうか","失禁の回数が1日3回以上かどうか"], answer:0, explanation:"正解：①IADによる発赤は骨突出部から離れた湿潤環境にさらされる部位（会陰部・肛門周囲・殿部広範囲）に出現し、びまん性・不整形が特徴。一方、褥瘡カテゴリーⅠは骨突出部（仙骨・尾骨・坐骨等）に一致して発生する境界比較的明瞭な発赤であり、部位の一致が最重要の鑑別点となる。②誤：年齢は発症リスク因子だが鑑別根拠にならない。③誤：紫色調は深部組織損傷（DTI）を示唆するが、IAD vs 褥瘡Ⅰの鑑別に特異的ではない。④誤：栄養状態は両疾患のリスク因子であり鑑別には使えない。⑤誤：失禁頻度はIADのリスク評価には使うが鑑別根拠にはならない。"},
  {id:169, school:"予想問題", topic:"失禁関連皮膚炎（IAD）・排泄ケア", question:"84歳女性。要介護3で特別養護老人ホーム入所中。尿失禁と軟便による二重失禁あり、1日8〜10回のオムツ交換を行っている。殿部から肛門周囲にびまん性の発赤・びらんが出現した。IADのスキンケアとして最も優先すべき介入はどれか。", options:["テープ固定型おむつから布おむつに変更する","皮膚洗浄後に撥水性の皮膚保護クリームを塗布し皮膚バリアを強化する","発赤部位にステロイド外用剤を毎日塗布する","尿道カテーテルを挿入して尿失禁をコントロールする","失禁パッドの交換回数を1日3回に減らして皮膚刺激を軽減する"], answer:1, explanation:"正解：②IADの基本ケアは「洗浄→保湿→保護」の構造化スキンケアであり、皮膚洗浄後に撥水性の保護クリームやワセリン、または専用の皮膚保護膜（フィルム型）を塗布し、尿・便の刺激から皮膚を守ることが最優先となる。①誤：布おむつは交換頻度の管理が困難であり、皮膚保護の観点から適切でない。③誤：IADはステロイドの適応外であり、一次的に使用すべきでない（二次感染悪化リスクあり）。④誤：尿道カテーテルは尿路感染のリスクが高く、IADケアの第一選択ではない。⑤誤：交換頻度を減らすことは皮膚への接触時間が増え悪化を招く。"},
  {id:170, school:"予想問題", topic:"失禁関連皮膚炎（IAD）・排泄ケア", question:"IADの重症度分類においてびらん・浸軟を伴うが皮膚全層欠損はない状態に相当するものはどれか。", options:["カテゴリー0（正常）","カテゴリー1（発赤のみ）","カテゴリー2（びらん・浸軟あり）","カテゴリー3（潰瘍形成）","カテゴリー4（皮下組織露出）"], answer:2, explanation:"正解：③IADの重症度分類では、カテゴリー1は発赤のみ（皮膚損傷なし）、カテゴリー2は発赤＋びらん・浸軟（表皮の欠損）、カテゴリー3は発赤＋潰瘍（真皮に及ぶ欠損）と分類される。びらん・浸軟を伴うがまだ全層欠損ではない状態がカテゴリー2（中等度）に相当する。①誤：カテゴリー0は皮膚変化なし（正常）。②誤：カテゴリー1は発赤のみで皮膚損傷はない軽度。④誤：カテゴリー3は潰瘍形成がある重度。⑤誤：カテゴリー4はIADの範囲を超え褥瘡に近い深い損傷であり、この分類では通常用いない。"},
  {id:171, school:"予想問題", topic:"失禁関連皮膚炎（IAD）・排泄ケア", question:"失禁パッドの正しい選択・使用に関して最も適切な記述はどれか。", options:["尿失禁量が少量の場合は高吸収型の大型パッドを使用する","ポリマー（高吸水性樹脂）を含むパッドは吸収後に尿を閉じ込めpHを弱酸性側に維持しアルカリ刺激から皮膚を保護する","失禁パッドは皮膚からの湿気を完全に遮断するため皮膚表面を常に乾燥させる","失禁パッドは就寝時のみ使用し日中は布製パンツに変更することが推奨される","二重失禁（尿＋便）があっても尿失禁用パッドをそのまま継続使用してよい"], answer:1, explanation:"正解：②現代の吸収型失禁パッドに含まれる高吸水性樹脂（ポリマー）は尿を素早く吸収してゲル化し、pHをほぼ中性〜弱酸性（5〜6程度）に保つ効果があり、アンモニアによるアルカリ刺激から皮膚を保護する機能を持つ。①誤：尿量が少量の場合は軽失禁用の薄型パッドを選択するのが適切；大型パッドは過剰であり皮膚への接触面積増加にもなる。③誤：失禁パッドは吸収後も皮膚を完全乾燥させるわけではなく、むしろ通気性と素早い吸収が重要。④誤：日中も失禁がある場合は状況に応じて継続使用することが適切。⑤誤：二重失禁がある場合は便を想定した製品や頻回交換が必要であり、尿失禁用のみでは対応不十分なことがある。"},
  {id:172, school:"予想問題", topic:"失禁関連皮膚炎（IAD）・排泄ケア", question:"72歳男性。脳梗塞後遺症で入院中。尿・便失禁があり会陰部にIADが発症している。IADの二次感染として最も頻度が高い原因菌・原因微生物はどれか。", options:["黄色ブドウ球菌（Staphylococcus aureus）","緑膿菌（Pseudomonas aeruginosa）","カンジダ・アルビカンス（Candida albicans）","溶血性連鎖球菌（Streptococcus pyogenes）","大腸菌（Escherichia coli）"], answer:2, explanation:"正解：③IADによる皮膚バリア機能低下・湿潤環境はカンジダ属（特にCandida albicans）の過増殖に最適な環境を提供する。IADの二次感染として真菌性（カンジダ）感染が最も多く、主病変周囲に衛星病変（小さな紅斑・丘疹・膿疱）が散在するのが特徴的所見。①誤：黄色ブドウ球菌感染はあり得るが、IAD二次感染で最頻度ではない。②誤：緑膿菌は湿潤環境好性だが会陰部IADの二次感染として最多ではない。④誤：溶連菌感染は蜂窩織炎の原因となるが、IAD二次感染としての頻度は低い。⑤誤：大腸菌は腸内常在菌で尿路感染等の原因となるが、IAD皮膚二次感染として最頻度ではない。"},
  {id:173, school:"予想問題", topic:"失禁関連皮膚炎（IAD）・排泄ケア", question:"WOC認定看護師が行う失禁の包括的アセスメントに使用するツールとして最も適切な組み合わせはどれか。", options:["失禁のタイプ・量・頻度の評価と皮膚状態の観察のみ行う","排尿日誌・残尿測定・パッドテスト・ICIQ-SFなど複数の評価ツールを組み合わせて評価する","尿道カテーテル挿入を最初に行い排泄状態を完全にコントロールする","失禁の種類にかかわらず骨盤底筋訓練を全例に指導する","失禁は加齢に伴う自然現象のため積極的な評価は行わない"], answer:1, explanation:"正解：②失禁の包括的アセスメントには①排尿日誌（失禁パターン・頻度の客観的把握）、②残尿測定（膀胱排出機能評価）、③パッドテスト（尿漏れ量の定量的評価）、④ICIQ-SF（International Consultation on Incontinence Questionnaire-Short Form：QOLへの影響評価）等を組み合わせることが推奨される。①誤：皮膚評価と失禁評価は必要だが「のみ」では不十分。③誤：カテーテル挿入は感染リスクがあり最初に行う介入ではない。④誤：骨盤底筋訓練は腹圧性・混合性失禁に有効だが全例適応ではなく、切迫性失禁には膀胱訓練等を組み合わせる。⑤誤：失禁は治療・ケアで改善可能であり積極的評価が重要。"},
